<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
  <title>My App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script>
    // Suppress Babel in-browser transformer warning
    const _warn = console.warn.bind(console);
    console.warn = (...args) => { if (typeof args[0] === 'string' && args[0].includes('Babel')) return; _warn(...args); };

    // Prevent page from jumping when inputs are focused
    document.addEventListener('focus', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
        const scrollY = window.scrollY;
        setTimeout(() => window.scrollTo({ top: scrollY, behavior: 'instant' }), 50);
        setTimeout(() => window.scrollTo({ top: scrollY, behavior: 'instant' }), 150);
        setTimeout(() => window.scrollTo({ top: scrollY, behavior: 'instant' }), 300);
      }
    }, true);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { touch-action: manipulation; }
    html, body, #root { height: 100%; background: #080c10; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #dde8f0;
      position: relative;
      overflow-x: hidden;
    }
    /* Mesh gradient ambient background, matching Expense Tracker */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(0,200,150,.07) 0%,transparent 60%),
        radial-gradient(ellipse 60% 60% at 100% 100%, rgba(56,182,232,.06) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 100%,  rgba(200,160,80,.05) 0%,transparent 60%);
      animation: mesh-shift 20s ease-in-out infinite alternate;
    }
    @keyframes mesh-shift { 0%{opacity:.8} 50%{opacity:1} 100%{opacity:.8} }
    @keyframes shine    { to { background-position:200% center; } }
    @keyframes fade-up  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes dot-pulse{ 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.4);opacity:1} }
    #root { position: relative; z-index: 1; }
    input, textarea, select, button { font-family: 'DM Sans', system-ui, sans-serif; font-size: 16px; touch-action: manipulation; -webkit-appearance: none; }
    input[type="date"] { color-scheme: dark; }
    input::placeholder, textarea::placeholder { color: #1c2c3a; }
    textarea { scrollbar-width: none; resize: none; }
    textarea::-webkit-scrollbar { display: none; }
    button { cursor: pointer; }
  </style>
</head>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const EXPENSE_TRACKER_HTML = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\"/>\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover\"/>\n  <title>Expense Tracker</title>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <link href=\"https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n  <style>\n    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');\n\n    :root {\n      /* Deep slate-green base \u2014 sophisticated, not harsh */\n      --bg:    #080c10;\n      --s1:    #0c1218;\n      --s2:    #101820;\n      --s3:    #141e28;\n      --s4:    #1a2530;\n      --b1:    rgba(255,255,255,.06);\n      --b2:    rgba(255,255,255,.11);\n      --text:  #dde8f0;\n      --sub:   #3d5468;\n      --dim:   #1c2c3a;\n      /* Accent palette */\n      --mint:  #00c896;   /* primary \u2014 fresh mint green */\n      --mint2: #00a87e;\n      --sky:   #38b6e8;   /* SGD blue */\n      --amber: #f0a030;   /* MYR amber */\n      --rose:  #f04860;   /* danger/over */\n      --gold:  #c8a050;   /* highlights */\n      --gold2: #e8c070;\n      --gold3: #f8e090;\n      --nav-h: 64px;\n    }\n\n    *,*::before,*::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }\n    html { touch-action:manipulation; }\n    html,body { margin:0; padding:0; overflow-x:hidden; }\n\n    body {\n      font-family:'DM Sans',system-ui,sans-serif;\n      background:var(--bg);\n      color:var(--text);\n      min-height:100dvh;\n      padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 8px);\n      position:relative;\n    }\n\n    /* Mesh gradient background */\n    body::before {\n      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;\n      background:\n        radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(0,200,150,.07) 0%,transparent 60%),\n        radial-gradient(ellipse 60% 60% at 100% 100%, rgba(56,182,232,.06) 0%,transparent 60%),\n        radial-gradient(ellipse 50% 40% at 50% 100%,  rgba(200,160,80,.05) 0%,transparent 60%);\n      animation: mesh-shift 20s ease-in-out infinite alternate;\n    }\n    @keyframes mesh-shift {\n      0%   { opacity:.8; }\n      50%  { opacity:1; }\n      100% { opacity:.8; }\n    }\n\n    .wrap { max-width:480px; margin:0 auto; padding:0 14px 8px; position:relative; z-index:1; }\n\n    /* \u2500\u2500 ANIMATIONS \u2500\u2500 */\n    @keyframes shine    { to { background-position:200% center; } }\n    @keyframes fade-up  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }\n    @keyframes tab-in   { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }\n    @keyframes dot-pulse{ 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.4);opacity:1} }\n    @keyframes glow-ring{ 0%,100%{filter:drop-shadow(0 0 4px rgba(0,200,150,.3))} 50%{filter:drop-shadow(0 0 12px rgba(0,200,150,.7))} }\n\n    /* \u2500\u2500 HEADER \u2500\u2500 */\n    .header {\n      display:flex; align-items:center; justify-content:space-between;\n      padding:22px 16px 12px; max-width:480px; margin:0 auto;\n      position:relative; z-index:1;\n    }\n    .header-title { font-size:22px; font-weight:900; letter-spacing:-.04em; color:var(--text); }\n    .header-title span {\n      background:linear-gradient(110deg, var(--mint) 0%, var(--gold3) 45%, var(--gold2) 70%, var(--mint) 100%);\n      background-size:200% auto;\n      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;\n      animation:shine 4s linear infinite;\n    }\n    .header-date { font-size:11px; color:var(--sub); margin-top:2px; font-weight:500; letter-spacing:.01em; }\n\n    /* \u2500\u2500 TABS \u2500\u2500 */\n    .tab-section { display:none; }\n    .tab-section.active { display:block; animation:tab-in .22s ease; }\n\n    /* \u2500\u2500 BASE CARD \u2500\u2500 */\n    .card {\n      background:var(--s2);\n      border:1px solid var(--b1);\n      border-top:1px solid var(--b2);\n      border-radius:20px; padding:16px; margin-bottom:10px;\n      animation:fade-up .3s ease both;\n    }\n    .card-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--sub); margin-bottom:12px; }\n\n    /* \u2500\u2500 RING CARD \u2014 HERO \u2500\u2500 */\n    .ring-card {\n      background: linear-gradient(180deg, #0a1a22 0%, #0c1820 40%, #080e14 100%);\n      border:1px solid rgba(0,200,150,.12);\n      border-top:1px solid rgba(0,200,150,.3);\n      border-radius:24px; padding:18px 16px 16px; margin-bottom:10px;\n      position:relative; overflow:hidden;\n      box-shadow: 0 0 0 1px rgba(0,0,0,.4), 0 20px 60px rgba(0,0,0,.5), 0 0 80px rgba(0,200,150,.04);\n      animation:fade-up .3s ease both;\n    }\n    /* Animated glow pulse behind ring */\n    .ring-card::before {\n      content:''; position:absolute;\n      left:50%; top:50%; transform:translate(-50%,-50%);\n      width:200px; height:200px; border-radius:50%;\n      background:radial-gradient(circle, rgba(0,200,150,.08) 0%, transparent 70%);\n      animation:ring-glow 3s ease-in-out infinite;\n      pointer-events:none; z-index:0;\n    }\n    @keyframes ring-glow {\n      0%,100% { transform:translate(-50%,-50%) scale(1);   opacity:.6; }\n      50%      { transform:translate(-50%,-50%) scale(1.2); opacity:1;  }\n    }\n    /* Top shimmer line */\n    .ring-card::after {\n      content:''; position:absolute; top:0; left:0; right:0; height:1px;\n      background:linear-gradient(90deg, transparent 5%, rgba(0,200,150,.6) 30%, rgba(56,182,232,.9) 55%, rgba(0,200,150,.6) 75%, transparent 95%);\n    }\n    .ring-hero-row { display:flex; align-items:center; justify-content:center; gap:0; position:relative; z-index:1; }\n    .ring-stats-col { flex:0 0 80px; display:flex; flex-direction:column; gap:12px; align-items:flex-start; margin-right:-6px; }\n    .ring-wrap { flex:0 0 150px; position:relative; width:150px; height:150px; }\n    .ring-ccy-col { flex:0 0 90px; display:flex; flex-direction:column; gap:8px; margin-left:12px; }\n    #ringCanvas { position:absolute; top:0; left:0; width:150px !important; height:150px !important; background:transparent !important; border:none !important; box-shadow:none !important; }\n    .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; gap:1px; }\n    .ring-label { font-size:8px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--sub); }\n    .ring-amount { font-size:17px; font-weight:900; color:var(--text); letter-spacing:-.03em; line-height:1.1; font-family:'DM Mono',monospace; transition:color .4s, text-shadow .4s; }\n    .ring-sep { width:16px; height:1px; background:rgba(255,255,255,.08); margin:3px 0; }\n    .ring-remain-label { font-size:7px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; }\n    .ring-remain { font-size:12px; font-weight:700; line-height:1.2; font-family:'DM Mono',monospace; transition:color .4s, text-shadow .4s; }\n    .ring-stat-label { font-size:8px; color:var(--sub); font-weight:600; margin-bottom:2px; text-transform:uppercase; letter-spacing:.06em; }\n    .ring-stat-val { font-size:12px; font-weight:700; color:var(--text); letter-spacing:-.01em; font-family:'DM Mono',monospace; }\n    .ring-ccy-col .ccy-card { padding:9px 10px; border-radius:13px; cursor:pointer; }\n    .ring-ccy-col .ccy-val { font-size:12px; font-weight:700; letter-spacing:-.01em; line-height:1.1; font-family:'DM Mono',monospace; }\n    .ring-ccy-col .ccy-lbl { font-size:8px; margin-bottom:3px; letter-spacing:.06em; }\n\n    /* \u2500\u2500 INSIGHT CARD \u2500\u2500 */\n    .insight-card {\n      background:linear-gradient(135deg, #0c1820 0%, #0a1620 100%);\n      border:1px solid var(--b1);\n      border-top:1px solid rgba(0,200,150,.22);\n      border-radius:20px; padding:14px 15px; margin-bottom:10px;\n      position:relative; overflow:hidden;\n      animation:fade-up .3s .05s ease both;\n    }\n    .insight-card::before {\n      content:''; position:absolute; top:0; left:0; right:0; height:1px;\n      background:linear-gradient(90deg, transparent, rgba(0,200,150,.55) 40%, rgba(56,182,232,.7) 65%, transparent);\n    }\n    .insight-header { display:flex; align-items:center; gap:7px; margin-bottom:10px; }\n    .insight-icon {\n      width:20px; height:20px; border-radius:6px; flex-shrink:0;\n      background:rgba(0,200,150,.1); border:1px solid rgba(0,200,150,.22);\n      display:flex; align-items:center; justify-content:center;\n      font-size:11px; color:var(--mint);\n    }\n    .insight-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:rgba(0,200,150,.65); }\n    .insight-text { font-size:12px; color:rgba(221,232,240,.72); line-height:1.7; font-weight:500; }\n    .insight-text strong { color:var(--mint); font-weight:700; }\n\n    /* \u2500\u2500 ADD FORM \u2500\u2500 */\n    .add-card {\n      background:var(--s2);\n      border:1px solid var(--b1);\n      border-top:1px solid rgba(200,160,80,.22);\n      border-radius:20px; padding:11px 13px; margin-bottom:10px;\n      animation:fade-up .3s .1s ease both;\n    }\n    .add-card-title {\n      font-size:12px; font-weight:800; letter-spacing:.02em;\n      margin-bottom:9px; display:flex; align-items:center; gap:8px;\n      color:var(--text);\n    }\n    .add-card-title .dot {\n      width:6px; height:6px; border-radius:50%; flex-shrink:0;\n      background:var(--gold2);\n      box-shadow:0 0 6px rgba(200,160,80,.8);\n      animation:dot-pulse 2s ease-in-out infinite;\n    }\n\n    .amount-wrap { position:relative; margin-bottom:8px; }\n    .amount-prefix {\n      position:absolute; left:12px; top:50%; transform:translateY(-50%);\n      font-size:14px; font-weight:700; color:rgba(200,160,80,.45); pointer-events:none; z-index:1;\n      font-family:'DM Mono',monospace;\n    }\n    #amountInput {\n      width:100%; height:46px; padding:0 105px 0 40px;\n      background:var(--s1); border:1px solid rgba(200,160,80,.15); border-radius:12px;\n      color:var(--text); font-size:24px; font-weight:900;\n      font-family:'DM Mono',monospace; letter-spacing:-.02em;\n    }\n    #amountInput:focus { outline:none; border-color:rgba(200,160,80,.45); box-shadow:0 0 0 3px rgba(200,160,80,.06); }\n    #amountInput::placeholder { color:var(--dim); font-weight:700; }\n\n    .ccy-inline { position:absolute; right:6px; top:50%; transform:translateY(-50%); display:flex; gap:4px; }\n    .ccy-chip {\n      height:28px; padding:0 9px; border-radius:8px; font-size:10px; font-weight:700;\n      background:var(--s3); border:1px solid var(--b1); color:var(--sub);\n      cursor:pointer; font-family:inherit; transition:all .18s;\n    }\n    .ccy-chip.active-sgd { background:rgba(56,182,232,.1); border-color:rgba(56,182,232,.3); color:#6dd4f8; }\n    .ccy-chip.active-myr { background:rgba(240,160,48,.1); border-color:rgba(240,160,48,.3); color:#f8c060; }\n\n    .form-row2 { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:7px; }\n    .form-label { font-size:9px; font-weight:700; color:var(--sub); margin-bottom:3px; display:block; letter-spacing:.07em; text-transform:uppercase; }\n\n    input:not(#amountInput), select {\n      width:100%; height:37px; padding:0 10px;\n      background:var(--s3); border:1px solid var(--b1); border-radius:10px;\n      color:var(--text); font-size:16px; font-family:'DM Sans',system-ui,sans-serif;\n      font-weight:500; -webkit-appearance:none; appearance:none; text-align:left;\n    }\n    .add-card input:not(#amountInput), .add-card select { text-align:center; background:var(--s1); border-color:rgba(200,160,80,.12); }\n    input:not(#amountInput):focus, select:focus { outline:none; border-color:rgba(0,200,150,.35); box-shadow:0 0 0 3px rgba(0,200,150,.05); }\n    input::placeholder { color:var(--dim); }\n    input[type=\"date\"]::-webkit-calendar-picker-indicator { filter:invert(.22); }\n\n    .btn-save {\n      width:100%; height:37px; border-radius:10px;\n      background:linear-gradient(110deg, var(--mint2) 0%, var(--mint) 60%, #00dfa8 100%);\n      background-size:200% auto;\n      border:none; color:#021a12;\n      font-size:11px; font-weight:800; font-family:'DM Sans',system-ui,sans-serif;\n      cursor:pointer; letter-spacing:.06em; text-transform:uppercase;\n      box-shadow:0 2px 0 rgba(0,0,0,.4), 0 4px 14px rgba(0,200,150,.18);\n      transition:background-position .3s, transform .1s;\n    }\n    .btn-save:active { transform:translateY(1px); box-shadow:0 1px 0 rgba(0,0,0,.4); }\n    .btn-save.editing { background:linear-gradient(110deg, #0080d0, #38b6e8); color:#021020; box-shadow:0 2px 0 rgba(0,0,0,.4), 0 4px 14px rgba(56,182,232,.18); }\n    .status { font-size:11px; color:var(--mint); min-height:14px; margin-top:6px; text-align:center; font-weight:700; letter-spacing:.04em; }\n\n    /* \u2500\u2500 CCY CARDS \u2500\u2500 */\n    .currency-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }\n    .ccy-card { border-radius:15px; padding:12px; background:var(--s3); border:1px solid var(--b1); cursor:pointer; transition:opacity .15s; }\n    .ccy-card:active { opacity:.7; }\n    .ccy-card.sgd { background:rgba(56,182,232,.06); border-color:rgba(56,182,232,.13); }\n    .ccy-card.myr { background:rgba(240,160,48,.06); border-color:rgba(240,160,48,.13); }\n    .ccy-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:4px; opacity:.5; }\n    .ccy-card.sgd .ccy-lbl { color:var(--sky); }\n    .ccy-card.myr .ccy-lbl { color:var(--amber); }\n    .ccy-val { font-size:19px; font-weight:800; letter-spacing:-.03em; font-family:'DM Mono',monospace; }\n    .ccy-card.sgd .ccy-val { color:#6dd4f8; }\n    .ccy-card.myr .ccy-val { color:#f8c060; }\n    .ccy-hint { font-size:9px; color:var(--dim); margin-top:4px; }\n\n    /* \u2500\u2500 CATEGORY GRID \u2500\u2500 */\n    .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }\n    .cat-card { background:var(--s3); border:1px solid var(--b1); border-radius:14px; padding:11px; cursor:pointer; transition:opacity .15s; }\n    .cat-card:active { opacity:.7; }\n    .cat-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; gap:6px; }\n    .cat-name { font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }\n    .cat-pct  { font-size:10px; font-weight:700; color:var(--sub); flex-shrink:0; white-space:nowrap; }\n    .bar-track { height:2px; background:rgba(255,255,255,.05); border-radius:99px; overflow:hidden; margin-bottom:5px; }\n    .bar-fill      { height:100%; border-radius:99px; background:var(--mint); box-shadow:0 0 5px rgba(0,200,150,.5); }\n    .bar-fill.warn { background:var(--amber); box-shadow:0 0 5px rgba(240,160,48,.5); }\n    .bar-fill.over { background:var(--rose); box-shadow:0 0 5px rgba(240,72,96,.5); }\n    .cat-amounts { font-size:10px; color:var(--sub); font-family:'DM Mono',monospace; }\n\n    /* \u2500\u2500 CHART \u2500\u2500 */\n    .chart-wrap { background:var(--s1); border-radius:13px; padding:8px; overflow:hidden; border:1px solid rgba(255,255,255,.04); }\n    canvas.trend { display:block; width:100% !important; height:auto !important; background:transparent; border:none; max-width:100%; }\n    .chart-legend { display:flex; gap:14px; margin-top:8px; }\n    .legend-dot  { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }\n    .legend-item { font-size:11px; color:var(--sub); font-weight:600; }\n    .chart-badge { display:inline-block; padding:3px 9px; border-radius:99px; background:var(--s3); border:1px solid var(--b1); color:var(--sub); font-size:10px; font-weight:600; }\n\n    /* \u2500\u2500 RECENT \u2500\u2500 */\n    .txn-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:13px; margin-bottom:5px; background:var(--s2); border:1px solid var(--b1); cursor:pointer; transition:background .12s; }\n    .txn-item:active, .txn-item.expanded { background:var(--s3); }\n    .txn-item.expanded { flex-wrap:wrap; }\n    .txn-icon { width:32px; height:32px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; }\n    .txn-icon.sgd { background:rgba(56,182,232,.09); border:1px solid rgba(56,182,232,.1); }\n    .txn-icon.myr { background:rgba(240,160,48,.09); border:1px solid rgba(240,160,48,.1); }\n    .txn-main { flex:1; min-width:0; }\n    .txn-cat  { font-size:13px; font-weight:700; }\n    .txn-meta { font-size:10px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n    .txn-amt  { font-size:13px; font-weight:700; letter-spacing:-.01em; text-align:right; flex-shrink:0; font-family:'DM Mono',monospace; }\n    .txn-amt.sgd { color:#6dd4f8; }\n    .txn-amt.myr { color:#f8c060; }\n    .txn-actions { display:none; padding:5px 0 1px; gap:6px; flex:none; width:100%; }\n    .txn-item.expanded .txn-actions { display:flex; }\n\n    /* \u2500\u2500 TXN ROWS \u2500\u2500 */\n    .row-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:13px; margin-bottom:5px; background:var(--s2); border:1px solid var(--b1); cursor:pointer; transition:background .12s; position:relative; flex-wrap:wrap; }\n    .row-item.expanded { background:var(--s3); }\n    .row-icon { width:32px; height:32px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; }\n    .row-icon.sgd { background:rgba(56,182,232,.09); border:1px solid rgba(56,182,232,.1); }\n    .row-icon.myr { background:rgba(240,160,48,.09); border:1px solid rgba(240,160,48,.1); }\n    .row-info { flex:1; min-width:0; }\n    .row-cat  { font-size:13px; font-weight:700; }\n    .row-sub  { font-size:10px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n    .row-right { text-align:right; flex-shrink:0; }\n    .row-amount { font-size:13px; font-weight:700; letter-spacing:-.01em; font-family:'DM Mono',monospace; }\n    .row-amount.sgd { color:#6dd4f8; }\n    .row-amount.myr { color:#f8c060; }\n    .row-date  { font-size:9px; color:var(--sub); margin-top:1px; font-family:'DM Mono',monospace; }\n    .row-actions { display:none; padding:5px 0 1px; gap:6px; width:100%; }\n    .row-item.expanded .row-actions { display:flex; }\n    .row-item > :not(.row-actions) { flex-shrink:0; }\n    .row-item > .row-info { flex-shrink:1; }\n\n    /* \u2500\u2500 SMALL BTNS \u2500\u2500 */\n    .btn-sm { flex:1; height:28px; border-radius:8px; font-size:10px; font-weight:700; border:none; cursor:pointer; font-family:inherit; }\n    .btn-sm.danger    { background:rgba(240,72,96,.09); color:#f08090; border:1px solid rgba(240,72,96,.16); }\n    .btn-sm.secondary { background:var(--s4); color:var(--sub); border:1px solid var(--b1); }\n    .btn-sm.primary   { background:rgba(0,200,150,.08); color:var(--mint); border:1px solid rgba(0,200,150,.18); }\n    .btn-sm:active { opacity:.7; }\n\n    /* \u2500\u2500 FILTER / UTIL \u2500\u2500 */\n    .filter-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }\n    .util-bar   { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; }\n    .util-btn { height:36px; border-radius:10px; font-size:11px; font-weight:600; border:1px solid var(--b1); background:var(--s3); color:var(--sub); cursor:pointer; font-family:inherit; }\n    .util-btn:active { opacity:.7; }\n    .util-btn.danger { background:rgba(240,72,96,.07); color:#f08090; border-color:rgba(240,72,96,.13); }\n\n    /* \u2500\u2500 SETTINGS \u2500\u2500 */\n    .settings-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--sub); margin-bottom:14px; }\n    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }\n    .btn-full { width:100%; height:38px; border-radius:11px; font-size:12px; font-weight:800; cursor:pointer; font-family:inherit; border:none; transition:opacity .15s; }\n    .btn-full.primary, .btn-full.success { background:linear-gradient(110deg, var(--mint2), var(--mint)); color:#021a12; box-shadow:0 2px 0 rgba(0,0,0,.4), 0 3px 12px rgba(0,200,150,.15); }\n    .btn-full.secondary { background:var(--s3); color:var(--sub); border:1px solid var(--b1); }\n    .btn-full.danger    { background:rgba(240,72,96,.07); color:#f08090; border:1px solid rgba(240,72,96,.13); }\n    .btn-full:active { opacity:.8; }\n    .s-row { display:grid; gap:8px; align-items:center; margin-bottom:10px; }\n    .s-row-2 { grid-template-columns:1fr 1fr; }\n    .s-row-3 { grid-template-columns:1fr auto auto; }\n    .s-row-4 { grid-template-columns:1fr 80px auto auto; }\n    .s-row-4e { grid-template-columns:1fr 1fr 1fr auto; }\n    .divider { border:none; border-top:1px solid rgba(255,255,255,.04); margin:12px 0; }\n    .pill-list { display:flex; flex-wrap:wrap; gap:6px; }\n    .pill { padding:5px 12px; border-radius:99px; background:rgba(0,200,150,.07); border:1px solid rgba(0,200,150,.15); color:var(--mint); font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; }\n    .pill.pill-active { background:rgba(0,200,150,.18); border-color:rgba(0,200,150,.4); color:#fff; }\n    .s-status { color:var(--mint); font-size:11px; min-height:14px; margin-top:8px; font-weight:700; text-align:center; }\n    .empty { padding:24px; text-align:center; color:var(--dim); font-size:13px; font-weight:500; }\n    #catTrendCards .card { margin-bottom:10px; overflow:hidden; }\n    #catTrendCards canvas { display:block; width:100% !important; height:auto !important; background:transparent; border:none; box-shadow:none; border-radius:8px; max-width:100%; }\n\n    /* \u2500\u2500 SUMMARY PANEL \u2500\u2500 */\n    .summary-card { background:var(--s2); border:1px solid var(--b1); border-radius:18px; padding:14px; margin-bottom:10px; }\n\n    /* \u2500\u2500 TOP TAB BAR (text style, like Leave app) \u2500\u2500 */\n    .top-tabs {\n      max-width:480px; margin:0 auto; padding:0 16px;\n      display:grid; grid-template-columns:1fr 1fr;\n      position:relative; z-index:1;\n    }\n    .top-tab {\n      height:34px; border:none; background:none;\n      color:rgba(255,255,255,.35);\n      font-family:'DM Sans',system-ui,sans-serif; font-size:14px; font-weight:700;\n      letter-spacing:.01em; cursor:pointer; transition:color .25s;\n    }\n    .top-tab.active { color:#ffffff; }\n    .top-tab:active { opacity:.7; }\n\n    .top-tab-underline-track {\n      max-width:480px; margin:0 auto; padding:0 16px;\n      height:1px; background:rgba(255,255,255,.08);\n      position:relative; z-index:1;\n    }\n    .top-tab-underline {\n      height:2px; width:50%; background:#ffffff;\n      box-shadow:0 0 8px rgba(255,255,255,.5);\n      transition:transform .3s cubic-bezier(.22,1,.36,1);\n      transform:translateX(0%);\n    }\n    .top-tab-underline.pos-1 { transform:translateX(100%); }\n\n    .top-tab-dots {\n      display:flex; justify-content:center; gap:5px;\n      padding:10px 0 8px; position:relative; z-index:1;\n    }\n    .top-dot {\n      width:6px; height:6px; border-radius:3px; background:rgba(255,255,255,.15);\n      transition:all .25s; cursor:pointer;\n    }\n    .top-dot.active { width:18px; background:#ffffff; }\n\n    /* \u2500\u2500 BOTTOM BAR (single Expense item, like Tasks/Leave) \u2500\u2500 */\n    .bottom-bar {\n      position:fixed; bottom:0; left:0; right:0; z-index:100;\n      height:var(--nav-h);\n      display:flex; align-items:center; justify-content:center;\n      background:rgba(8,12,16,.97);\n      border-top:1px solid var(--b1);\n      padding-bottom:env(safe-area-inset-bottom,0);\n    }\n    .bottom-bar-item {\n      display:flex; flex-direction:column; align-items:center; justify-content:center;\n      gap:4px; color:var(--mint);\n    }\n    .bottom-bar-icon {\n      width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.8;\n      filter:drop-shadow(0 0 5px rgba(0,200,150,.6));\n    }\n    .bottom-bar-label {\n      font-family:'DM Sans',system-ui,sans-serif; font-size:10px; font-weight:700;\n      letter-spacing:.04em; color:var(--mint);\n    }\n  </style>\n\n</head>\n\n<body>\n\n  <!-- HEADER -->\n  <div class=\"header\">\n    <div>\n      <div class=\"header-title\">Expense <span>Tracker</span></div>\n    </div>\n    <div style=\"text-align:right\">\n      <div id=\"headerTime\" style=\"font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1;font-family:'DM Mono',monospace\"></div>\n      <div id=\"headerMonth\" style=\"font-size:11px;color:var(--sub);font-weight:500;margin-top:3px\"></div>\n    </div>\n  </div>\n\n  <!-- TOP TAB BAR -->\n  <div class=\"top-tabs\">\n    <button class=\"top-tab active\" id=\"navDashboard\">Home</button>\n    <button class=\"top-tab\" id=\"navAdd\">Transactions</button>\n  </div>\n  <div class=\"top-tab-underline-track\">\n    <div class=\"top-tab-underline\" id=\"tabUnderline\"></div>\n  </div>\n  <div class=\"top-tab-dots\">\n    <span class=\"top-dot active\" id=\"dotDashboard\"></span>\n    <span class=\"top-dot\" id=\"dotAdd\"></span>\n  </div>\n\n  <div class=\"wrap\" id=\"swipeWrap\">\n\n    <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n         DASHBOARD TAB\n    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n    <div id=\"dashboardTab\" class=\"tab-section active\">\n\n      <!-- Budget ring + currency + stats in one row -->\n      <div class=\"ring-card\">\n        <div class=\"ring-hero-row\">\n          <!-- Stats on left -->\n          <div class=\"ring-stats-col\">\n            <div class=\"ring-stat\">\n              <div class=\"ring-stat-label\">Budget</div>\n              <div class=\"ring-stat-val\" id=\"ringStat1\">\u2014</div>\n            </div>\n            <div class=\"ring-stat\">\n              <div class=\"ring-stat-label\">Daily avg</div>\n              <div class=\"ring-stat-val\" id=\"ringStat2\">\u2014</div>\n            </div>\n            <div class=\"ring-stat\">\n              <div class=\"ring-stat-label\">Days left</div>\n              <div class=\"ring-stat-val\" id=\"ringStat3\">\u2014</div>\n            </div>\n          </div>\n          <!-- Ring in center -->\n          <div class=\"ring-wrap\">\n            <canvas id=\"ringCanvas\" width=\"300\" height=\"300\"></canvas>\n            <div class=\"ring-center\">\n              <div class=\"ring-label\">Spent</div>\n              <div class=\"ring-amount\" id=\"ringSpent\">S$0</div>\n              <div class=\"ring-sep\"></div>\n              <div class=\"ring-remain-label\">Left</div>\n              <div class=\"ring-remain\" id=\"ringRemain\">\u2014</div>\n            </div>\n          </div>\n          <!-- SGD / MYR on right -->\n          <div class=\"ring-ccy-col\">\n            <div class=\"ccy-card sgd\" data-filter=\"SGD\">\n              <div class=\"ccy-lbl\" id=\"sgdMonthLabel\">SGD</div>\n              <div class=\"ccy-val\" id=\"monthSgdBox\">S$0.00</div>\n            </div>\n            <div class=\"ccy-card myr\" data-filter=\"MYR\">\n              <div class=\"ccy-lbl\" id=\"myrMonthLabel\">MYR</div>\n              <div class=\"ccy-val\" id=\"monthMyrBox\">RM0.00</div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <!-- ADD TRANSACTION -->\n      <div class=\"add-card\">\n        <div class=\"add-card-title\"><div class=\"dot\"></div> Add Transaction</div>\n\n        <input type=\"hidden\" id=\"currencyInput\" value=\"SGD\">\n\n        <form id=\"txnForm\">\n          <!-- Row 1: Date + Category -->\n          <div class=\"form-row2\">\n            <div>\n              <label class=\"form-label\" for=\"dateInput\">Date</label>\n              <input id=\"dateInput\" type=\"date\" required>\n            </div>\n            <div>\n              <label class=\"form-label\" for=\"categoryInput\">Category</label>\n              <select id=\"categoryInput\"></select>\n            </div>\n          </div>\n          <!-- Row 2: Amount + currency chips -->\n          <div class=\"amount-wrap\">\n            <span class=\"amount-prefix\" id=\"amountPrefix\">S$</span>\n            <input id=\"amountInput\" type=\"number\" step=\"0.01\" min=\"0.01\"\n              placeholder=\"0.00\" required inputmode=\"decimal\" autocomplete=\"off\">\n            <div class=\"ccy-inline\">\n              <button type=\"button\" class=\"ccy-chip active-sgd\" id=\"chipSGD\">SGD</button>\n              <button type=\"button\" class=\"ccy-chip\" id=\"chipMYR\">MYR</button>\n            </div>\n          </div>\n          <!-- Row 3: Note + Save -->\n          <div class=\"form-row2\" style=\"margin-bottom:0\">\n            <div>\n              <label class=\"form-label\" for=\"noteInput\">Note <span style=\"color:var(--dim);font-weight:400\">(optional)</span></label>\n              <input id=\"noteInput\" type=\"text\" placeholder=\"e.g. Lunch\">\n            </div>\n            <div style=\"display:flex;flex-direction:column;justify-content:flex-end\">\n              <button type=\"submit\" class=\"btn-save\" id=\"saveBtn\">Save</button>\n            </div>\n          </div>\n        </form>\n        <div class=\"status\" id=\"statusBox\"></div>\n      </div>\n\n      <!-- Category budgets -->\n      <div class=\"card\" style=\"border-top-color:rgba(192,136,48,.2);background:linear-gradient(160deg,#131108 0%,var(--s2) 100%);\">\n        <div class=\"card-title\" style=\"color:rgba(192,136,48,.5)\">Category Budget</div>\n        <div id=\"sgdCategoryCards\" class=\"cat-grid\"></div>\n      </div>\n\n      <!-- Recent -->\n      <div class=\"card\" style=\"border-top-color:rgba(255,255,255,.12);\">\n        <div class=\"card-title\">Recent Transactions</div>\n        <div id=\"recentArea\"></div>\n      </div>\n\n    </div><!-- /dashboardTab -->\n\n    <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n         TRANSACTIONS TAB\n    \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n    <div id=\"addTab\" class=\"tab-section\">\n      <div id=\"summaryArea\"></div>\n\n      <!-- INSIGHT CARD -->\n      <div class=\"insight-card\">\n        <div class=\"insight-header\">\n          <span class=\"insight-icon\">\u2726</span>\n          <span class=\"insight-label\">Spending Insights</span>\n        </div>\n        <div class=\"insight-text\" id=\"insightText\">Switch to this tab to see insights.</div>\n      </div>\n\n      <!-- Trend chart -->\n      <div class=\"card\" style=\"border-top-color:rgba(74,184,255,.2);background:linear-gradient(160deg,#080e16 0%,var(--s2) 100%);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n          <div class=\"card-title\" style=\"margin:0;color:rgba(74,184,255,.5)\">12-Month Trend</div>\n          <span class=\"chart-badge\" id=\"trendBudgetBadge\">Budget: \u2014</span>\n        </div>\n        <div class=\"chart-wrap\">\n          <canvas class=\"trend\" id=\"trendCanvas\" width=\"600\" height=\"260\"></canvas>\n        </div>\n        <div class=\"chart-legend\">\n          <span class=\"legend-item\"><span class=\"legend-dot\" style=\"background:#4ab8ff\"></span>SGD</span>\n          <span class=\"legend-item\"><span class=\"legend-dot\" style=\"background:#ff9448\"></span>MYR</span>\n        </div>\n      </div>\n\n      <div id=\"catTrendCards\"></div>\n\n      <!-- ALL TRANSACTIONS -->\n      <div class=\"card\">\n        <div class=\"card-title\">All Transactions</div>\n        <div class=\"filter-row\">\n          <div>\n            <div class=\"form-label\">Month</div>\n            <select id=\"filterMonth\"></select>\n          </div>\n          <div>\n            <div class=\"form-label\">Currency</div>\n            <select id=\"filterCurrency\">\n              <option value=\"\">All</option>\n              <option value=\"SGD\">SGD</option>\n              <option value=\"MYR\">MYR</option>\n            </select>\n          </div>\n          <div>\n            <div class=\"form-label\">Category</div>\n            <select id=\"filterCategory\"></select>\n          </div>\n        </div>\n        <div class=\"util-bar\" style=\"grid-template-columns:1fr 1fr\">\n          <button class=\"util-btn\" id=\"resetFilterBtn\">Reset Filters</button>\n          <button class=\"util-btn danger\" id=\"clearAllBtn\">Clear All Data</button>\n        </div>\n        <div id=\"tableArea\" style=\"margin-top:14px\"></div>\n      </div>\n\n      <!-- \u2550\u2550 SETTINGS \u2014 at the bottom \u2550\u2550 -->\n      <div class=\"card\">\n        <div class=\"settings-title\">Settings</div>\n\n        <div class=\"form-label\">Monthly Budget (SGD)</div>\n        <div class=\"s-row s-row-3\" style=\"margin-bottom:12px\">\n          <input id=\"budgetAmountInput\" type=\"number\" step=\"0.01\" min=\"0\" placeholder=\"0.00\">\n          <button class=\"btn-full secondary\" id=\"clearBudgetBtn\">Clear</button>\n          <button class=\"btn-full success\" id=\"saveBudgetBtn\">Save</button>\n        </div>\n\n        <hr class=\"divider\">\n\n        <div class=\"form-label\">Category Budget (SGD)</div>\n        <div class=\"s-row s-row-4\" style=\"margin-bottom:12px\">\n          <select id=\"budgetCategoryInput\"></select>\n          <input id=\"categoryBudgetAmountInput\" type=\"number\" step=\"0.01\" min=\"0\" placeholder=\"0.00\">\n          <button class=\"btn-full secondary\" id=\"clearCategoryBudgetsBtn\">Clear</button>\n          <button class=\"btn-full success\" id=\"saveCategoryBudgetBtn\">Save</button>\n        </div>\n\n        <hr class=\"divider\">\n\n        <div class=\"form-label\">Categories</div>\n        <div class=\"s-row\" style=\"grid-template-columns:1fr auto auto;margin-bottom:8px\">\n          <input id=\"newCategoryInput\" type=\"text\" placeholder=\"Tap a pill or type new name\">\n          <button class=\"btn-full danger\" id=\"deleteCategoryBtn\">Delete</button>\n          <button class=\"btn-full success\" id=\"addCategoryBtn\">Save</button>\n        </div>\n        <div id=\"categoryList\" class=\"pill-list\" style=\"margin-top:6px\"></div>\n        <input id=\"editCategorySelect\" type=\"hidden\" value=\"\">\n        <input id=\"renameCategoryInput\" type=\"text\" style=\"display:none\">\n\n        <div class=\"s-status\" id=\"statusBoxSettings\"></div>\n      </div>\n\n    </div>\n\n  </div><!-- /wrap -->\n\n  <!-- BOTTOM NAV -->\n  <nav class=\"bottom-bar\">\n    <div class=\"bottom-bar-item\">\n      <svg viewBox=\"0 0 24 24\" class=\"bottom-bar-icon\"><path d=\"M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6\"/></svg>\n      <span class=\"bottom-bar-label\">Expense</span>\n    </div>\n  </nav>\n\n<script>\n(function(){\n  const KEY='expense_tracker_sgd_myr_clean_v3';\n  let records=[], categories=['Food & Drink','Transport','Grocery','Miscellaneous'], budgetSGD=0, categoryBudgets={}, editingId=null, selectedCategory='';\n\n  const $=id=>document.getElementById(id);\n  const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};\n  const month=()=>today().slice(0,7);\n  const money=(n,c='SGD')=>(c==='MYR'?'RM ':'S$ ')+Number(n||0).toFixed(2);\n  const moneyShort=(n,c='SGD')=>(c==='MYR'?'RM':'S$')+Number(n||0).toFixed(2);\n  const esc=s=>String(s||'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[m]));\n  const setStatus=msg=>{ $('statusBox').textContent=msg||''; $('statusBoxSettings').textContent=msg||''; };\n  const catEmoji=c=>({'Food & Drink':'\ud83c\udf5c','Transport':'\ud83d\ude97','Grocery':'\ud83d\uded2','Shopping':'\ud83d\udecd\ufe0f','Entertainment':'\ud83c\udfac','Health':'\ud83d\udc8a','Travel':'\u2708\ufe0f','Miscellaneous':'\ud83d\udce6'}[c]||'\ud83d\udcb3');\n\n  function load(){\n    try{const raw=localStorage.getItem(KEY);if(raw){const d=JSON.parse(raw);records=Array.isArray(d.records)?d.records:[];categories=Array.isArray(d.categories)&&d.categories.length?d.categories:categories;budgetSGD=Number(d.budgetSGD||0);categoryBudgets=d.categoryBudgets||{};}}catch(e){}\n    records=records.map(r=>({...r,currency:r.currency||'SGD'}));\n  }\n  function save(){try{localStorage.setItem(KEY,JSON.stringify({records,categories,budgetSGD,categoryBudgets}));}catch(e){}}\n\n  function refreshCategories(){\n    const opts=categories.map(c=>`<option value=\"${esc(c)}\">${esc(c)}</option>`).join('');\n    ['categoryInput','budgetCategoryInput'].forEach(id=>{if($(id))$(id).innerHTML=opts;});\n    $('filterCategory').innerHTML='<option value=\"\">All</option>'+opts;\n    $('categoryList').innerHTML=categories.map(c=>`<span class=\"pill cat-pill\" data-cat=\"${esc(c)}\">${esc(c)}</span>`).join('');\n    $('categoryList').querySelectorAll('.cat-pill').forEach(pill=>{\n      pill.addEventListener('click',()=>{\n        selectedCategory=pill.dataset.cat;\n        $('newCategoryInput').value=selectedCategory;\n        $('categoryList').querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('pill-active'));\n        pill.classList.add('pill-active');\n      });\n    });\n  }\n\n  function totals(c,cur=false){return records.filter(r=>(r.currency||'SGD')===c&&(!cur||r.date.startsWith(month()))).reduce((a,r)=>a+Number(r.amount||0),0);}\n  function monthName(){return new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}\n  function catMap(c){const m={};records.forEach(r=>{if((r.currency||'SGD')!==c||!r.date.startsWith(month()))return;m[r.category]=(m[r.category]||0)+Number(r.amount||0);});return m;}\n\n  /* \u2500\u2500 Ring \u2500\u2500 */\n  function renderRing(){\n    const canvas=$('ringCanvas');if(!canvas)return;\n    const ctx=canvas.getContext('2d');\n    const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=W*0.40,thick=W*0.055;\n    ctx.clearRect(0,0,W,H);\n    const spent=records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(month())).reduce((a,r)=>a+Number(r.amount||0),0);\n    const budget=Number(budgetSGD||0),pct=budget>0?Math.min(spent/budget,1):0;\n    function arcColor(t){\n      const s=[[0,[0,200,150]],[0.65,[0,200,150]],[0.82,[240,160,48]],[1.0,[240,72,96]]];\n      let a=s[0],b=s[s.length-1];\n      for(let i=0;i<s.length-1;i++){if(t>=s[i][0]&&t<=s[i+1][0]){a=s[i];b=s[i+1];break;}}\n      const tt=b[0]===a[0]?1:(t-a[0])/(b[0]-a[0]);\n      return a[1].map((v,i)=>Math.round(v+(b[1][i]-v)*tt));\n    }\n    // Track \u2014 subtle dashed style\n    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);\n    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=thick;ctx.stroke();\n    // Inner track ring (decorative)\n    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);\n    ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=thick+4;ctx.stroke();\n\n    if(budget>0&&pct>0){\n      const start=-Math.PI/2, end=start+Math.PI*2*pct;\n      const [rv,gv,bv]=arcColor(pct);\n      const color=`rgb(${rv},${gv},${bv})`;\n      // Gradient arc\n      const grad=ctx.createLinearGradient(cx-r,cy-r,cx+r,cy+r);\n      grad.addColorStop(0,`rgba(${rv},${gv},${bv},.6)`);\n      grad.addColorStop(1,`rgb(${rv},${gv},${bv})`);\n      // Glow shadow\n      ctx.shadowColor=color; ctx.shadowBlur=W*0.07;\n      ctx.beginPath();ctx.arc(cx,cy,r,start,end);\n      ctx.strokeStyle=grad; ctx.lineWidth=thick; ctx.lineCap='round'; ctx.stroke();\n      ctx.shadowBlur=0;\n      // Glowing dot at arc tip\n      const tipX=cx+r*Math.cos(end), tipY=cy+r*Math.sin(end);\n      // Outer glow\n      ctx.beginPath();ctx.arc(tipX,tipY,thick*0.85,0,Math.PI*2);\n      ctx.fillStyle=`rgba(${rv},${gv},${bv},.25)`;ctx.fill();\n      // Inner bright dot\n      ctx.beginPath();ctx.arc(tipX,tipY,thick*0.45,0,Math.PI*2);\n      ctx.fillStyle=`rgb(${rv},${gv},${bv})`;\n      ctx.shadowColor=color;ctx.shadowBlur=W*0.05;ctx.fill();ctx.shadowBlur=0;\n      // Tiny white core\n      ctx.beginPath();ctx.arc(tipX,tipY,thick*0.18,0,Math.PI*2);\n      ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();\n    } else {\n      // No budget \u2014 decorative full ring\n      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);\n      ctx.strokeStyle='rgba(0,200,150,.08)';ctx.lineWidth=thick;ctx.stroke();\n    }\n    // Health colors \u2014 only spent and remain get health color\n    const remain=budget>0?budget-spent:null;\n    const healthColor = remain===null ? 'var(--text)' : remain<0 ? '#f04860' : remain<=budget*.2 ? '#f0a030' : '#00c896';\n\n    // Spent \u2014 large, health-colored\n    $('ringSpent').textContent=moneyShort(spent,'SGD');\n    $('ringSpent').style.color = budget>0 ? healthColor : 'var(--text)';\n    $('ringSpent').style.textShadow = budget>0 ? `0 0 12px ${healthColor}55` : 'none';\n\n    // Remaining\n    const rEl=$('ringRemain');\n    if(remain===null){rEl.textContent='Set budget';rEl.style.color='var(--dim)';rEl.style.textShadow='none';}\n    else if(remain<0){rEl.textContent=moneyShort(Math.abs(remain),'SGD')+' over';rEl.style.color='#f04860';rEl.style.textShadow='0 0 10px rgba(240,72,96,.4)';}\n    else{rEl.textContent=moneyShort(remain,'SGD');rEl.style.color=healthColor;rEl.style.textShadow=`0 0 10px ${healthColor}44`;}\n\n    // Stats \u2014 all plain white, no health color\n    const now=new Date(),d=now.getDate(),dm=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();\n    $('ringStat1').textContent=budget>0?moneyShort(budget,'SGD'):'\u2014';\n    $('ringStat1').style.color='var(--text)';\n    $('ringStat2').textContent=d>0?moneyShort(spent/d,'SGD')+'/d':'\u2014';\n    $('ringStat2').style.color='var(--text)';\n    $('ringStat3').textContent=(dm-d)+'d';\n    $('ringStat3').style.color='var(--text)';\n  }\n\n  function renderDashboard(){\n    renderRing();\n    const mn=monthName(),sgd=totals('SGD',true),myr=totals('MYR',true);\n    $('sgdMonthLabel').textContent='SGD';\n    $('myrMonthLabel').textContent='MYR';\n    $('monthSgdBox').textContent=money(sgd,'SGD');\n    $('monthMyrBox').textContent=money(myr,'MYR');\n    // Update time every second\n    if(!window._timerId){\n      window._timerId=setInterval(()=>{\n        const t=new Date();\n        const time=t.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',second:'2-digit'});\n        $('headerTime').textContent=time;\n      },1000);\n    }\n    $('headerTime').textContent=new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',second:'2-digit'});\n    $('headerMonth').textContent=mn;\n    $('trendBudgetBadge').textContent='Budget: '+(budgetSGD>0?money(budgetSGD,'SGD'):'\u2014');\n    renderCategoryCards();\n  }\n\n  function renderCategoryCards(){\n    const m=catMap('SGD');\n    $('sgdCategoryCards').innerHTML=categories.map(cat=>{\n      const sp=Number(m[cat]||0),bgt=Number(categoryBudgets[cat]||0),pct=bgt>0?sp/bgt*100:0,cls=pct>=100?'over':pct>=80?'warn':'';\n      return `<div class=\"cat-card\" data-cat=\"${esc(cat)}\">\n        <div class=\"cat-top\"><div class=\"cat-name\">${catEmoji(cat)} ${esc(cat)}</div><div class=\"cat-pct\">${bgt>0?Math.round(pct)+'%':'\u2014'}</div></div>\n        <div class=\"bar-track\"><div class=\"bar-fill ${cls}\" style=\"width:${Math.min(pct,100)}%\"></div></div>\n        <div class=\"cat-amounts\">${money(sp,'SGD')}${bgt>0?' / '+money(bgt,'SGD'):''}</div>\n      </div>`;\n    }).join('')||'<div class=\"empty\">No categories.</div>';\n    $('sgdCategoryCards').querySelectorAll('[data-cat]').forEach(c=>{\n      c.addEventListener('click',()=>{$('filterCategory').value=c.dataset.cat;$('filterCurrency').value='SGD';$('filterMonth').value=month();renderTable();switchTab('addTab',true);});\n    });\n  }\n\n  function renderTrendChart(){\n    const cv=$('trendCanvas'),ctx=cv.getContext('2d');\n    ctx.clearRect(0,0,cv.width,cv.height);\n    const lbl=[],sgd=[],myr=[],now=new Date();\n    for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1),k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');lbl.push(d.toLocaleString(undefined,{month:'short'}));sgd.push(records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(k)).reduce((a,r)=>a+Number(r.amount||0),0));myr.push(records.filter(r=>(r.currency||'SGD')==='MYR'&&r.date.startsWith(k)).reduce((a,r)=>a+Number(r.amount||0),0));}\n    const max=Math.max(budgetSGD,...sgd,...myr,1);\n    const L=36,R=8,T=28,B=24,W=cv.width-L-R,H=cv.height-T-B;\n    // Y-axis grid lines + labels\n    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;\n    for(let g=0;g<=3;g++){\n      const y=T+H/3*g,val=Math.round(max*(1-g/3));\n      ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(L+W,y);ctx.stroke();\n      ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='8px Inter,system-ui';ctx.textAlign='right';\n      ctx.fillText(val>=1000?(val/1000).toFixed(1)+'k':val,L-4,y+3);\n    }\n    if(budgetSGD>0){const y=T+H-(budgetSGD/max)*H;ctx.beginPath();ctx.setLineDash([5,5]);ctx.moveTo(L,y);ctx.lineTo(L+W,y);ctx.strokeStyle='rgba(167,139,250,.5)';ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);}\n    function drawLine(vals,color){\n      const pts=vals.map((v,i)=>({x:L+W/(vals.length-1)*i,y:T+H-(v/max)*H,v}));\n      ctx.beginPath();ctx.moveTo(pts[0].x,T+H);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,T+H);ctx.closePath();\n      const gr=ctx.createLinearGradient(0,T,0,T+H);gr.addColorStop(0,color+'28');gr.addColorStop(1,color+'00');ctx.fillStyle=gr;ctx.fill();\n      ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();\n      pts.forEach(p=>{\n        // dot\n        ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();\n        // value label above dot (only if > 0)\n        if(p.v>0){\n          const label=p.v>=1000?(p.v/1000).toFixed(1)+'k':Math.round(p.v).toString();\n          ctx.fillStyle=color;ctx.font='bold 8px Inter,system-ui';ctx.textAlign='center';\n          ctx.fillText(label,p.x,p.y-7);\n        }\n      });\n    }\n    drawLine(sgd,'#38b6e8');drawLine(myr,'#fb923c');\n    // X-axis month labels\n    ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='9px Inter,system-ui';ctx.textAlign='center';\n    lbl.forEach((m,i)=>ctx.fillText(m,L+W/(lbl.length-1)*i,cv.height-7));\n  }\n\n  function renderRecent(){\n    const area=$('recentArea');\n    if(!records.length){area.innerHTML='<div class=\"empty\">No transactions yet \u2014 add one above!</div>';return;}\n    area.innerHTML=records.slice(0,6).map(r=>`\n      <div class=\"txn-item\" data-id=\"${r.id}\">\n        <div class=\"txn-icon ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}\">${catEmoji(r.category)}</div>\n        <div class=\"txn-main\">\n          <div class=\"txn-cat\">${esc(r.category)}</div>\n          <div class=\"txn-meta\">${esc(r.date)}${r.note?' \u00b7 '+esc(r.note):''}</div>\n        </div>\n        <div class=\"txn-amt ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}\">${money(r.amount,r.currency||'SGD')}</div>\n        <div class=\"txn-actions\" style=\"display:none\">\n          <button class=\"btn-sm danger\" data-del=\"${r.id}\">Delete</button>\n          <button class=\"btn-sm primary\" data-edit=\"${r.id}\">Edit</button>\n        </div>\n      </div>`).join('');\n    area.querySelectorAll('.txn-item').forEach(item=>{\n      item.addEventListener('click',e=>{\n        if(e.target.closest('button'))return;\n        const open=item.classList.contains('expanded');\n        area.querySelectorAll('.txn-item').forEach(i=>{i.classList.remove('expanded');i.querySelector('.txn-actions').style.display='none';});\n        if(!open){item.classList.add('expanded');item.querySelector('.txn-actions').style.display='flex';}\n      });\n    });\n    area.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();editRecord(Number(b.dataset.edit));});\n    area.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();deleteRecord(Number(b.dataset.del));});\n  }\n\n  function filtered(){const fm=$('filterMonth').value,fc=$('filterCurrency').value,fcat=$('filterCategory').value;return records.filter(r=>(!fm||r.date.startsWith(fm))&&(!fc||(r.currency||'SGD')===fc)&&(!fcat||r.category===fcat)).sort((a,b)=>b.date.localeCompare(a.date));}\n\n  let _showAllTxns=false;\n  function renderTable(){\n    const data=filtered(),area=$('tableArea'),summary=$('summaryArea');\n    if(!data.length){\n      if(summary)summary.innerHTML='';\n      area.innerHTML='<div class=\"empty\">No transactions found.</div>';\n      return;\n    }\n    const sgdTotal=data.filter(r=>(r.currency||'SGD')==='SGD').reduce((a,r)=>a+Number(r.amount),0);\n    const myrTotal=data.filter(r=>(r.currency||'SGD')==='MYR').reduce((a,r)=>a+Number(r.amount),0);\n    const avg=data.length?(sgdTotal+myrTotal)/data.length:0;\n    const catTotals={};\n    data.filter(r=>(r.currency||'SGD')==='SGD').forEach(r=>{catTotals[r.category]=(catTotals[r.category]||0)+Number(r.amount);});\n    const topCats=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);\n    const grandSgd=sgdTotal||1;\n    const catBars=topCats.map(([cat,val])=>{\n      const pct=Math.round(val/grandSgd*100);\n      return `<div style=\"margin-bottom:6px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:3px\">\n          <span style=\"font-size:11px;font-weight:600;color:var(--text)\">${catEmoji(cat)} ${esc(cat)}</span>\n          <span style=\"font-size:11px;color:var(--sub)\">${money(val,'SGD')} \u00b7 ${pct}%</span>\n        </div>\n        <div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:${pct}%\"></div></div>\n      </div>`;\n    }).join('');\n    if(summary) summary.innerHTML=`\n      <div style=\"background:var(--s2);border:1px solid var(--b1);border-radius:18px;padding:14px;margin-bottom:12px\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-bottom:${topCats.length&&sgdTotal>0?'12px':'0'}\">\n          <div style=\"text-align:center\">\n            <div style=\"font-size:10px;color:var(--sub);font-weight:500;margin-bottom:3px\">SGD Total</div>\n            <div style=\"font-size:14px;font-weight:800;color:#7dd3fc;letter-spacing:-.02em\">${money(sgdTotal,'SGD')}</div>\n          </div>\n          <div style=\"text-align:center;border-left:1px solid var(--b0);border-right:1px solid var(--b0)\">\n            <div style=\"font-size:10px;color:var(--sub);font-weight:500;margin-bottom:3px\">MYR Total</div>\n            <div style=\"font-size:14px;font-weight:800;color:#fdba74;letter-spacing:-.02em\">${money(myrTotal,'MYR')}</div>\n          </div>\n          <div style=\"text-align:center\">\n            <div style=\"font-size:10px;color:var(--sub);font-weight:500;margin-bottom:3px\">${data.length} Txn${data.length>1?'s':''}</div>\n            <div style=\"font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.02em\">${data.length>1?'~'+money(avg,'SGD').replace('S$ ','S$'):''}</div>\n          </div>\n        </div>\n        ${topCats.length&&sgdTotal>0?`<div style=\"border-top:1px solid var(--b0);padding-top:10px\">${catBars}</div>`:''}\n      </div>`;\n\n    const LIMIT=8;\n    const visible=_showAllTxns?data:data.slice(0,LIMIT);\n    const remaining=data.length-LIMIT;\n\n    area.innerHTML=visible.map(r=>`\n      <div class=\"row-item\" data-id=\"${r.id}\">\n        <div class=\"row-icon ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}\">${catEmoji(r.category)}</div>\n        <div class=\"row-info\">\n          <div class=\"row-cat\">${esc(r.category)}</div>\n          <div class=\"row-sub\">${esc(r.note||'\u2014')}</div>\n        </div>\n        <div class=\"row-right\">\n          <div class=\"row-amount ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}\">${money(r.amount,r.currency||'SGD')}</div>\n          <div class=\"row-date\">${esc(r.date)}</div>\n        </div>\n        <div class=\"row-actions\" style=\"display:none\">\n          <button class=\"btn-sm danger\" data-del=\"${r.id}\">Delete</button>\n          <button class=\"btn-sm primary\" data-edit=\"${r.id}\">Edit</button>\n        </div>\n      </div>`).join('')\n      + (remaining>0&&!_showAllTxns\n        ? `<button id=\"showMoreTxnsBtn\" style=\"width:100%;height:38px;border-radius:11px;background:var(--s3);border:1px solid var(--b1);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px\">Show ${remaining} more \u2193</button>`\n        : _showAllTxns&&data.length>LIMIT\n        ? `<button id=\"showLessTxnsBtn\" style=\"width:100%;height:38px;border-radius:11px;background:var(--s3);border:1px solid var(--b1);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px\">Show less \u2191</button>`\n        : '');\n\n    area.querySelectorAll('.row-item').forEach(row=>{\n      row.addEventListener('click',e=>{\n        if(e.target.closest('button'))return;\n        const open=row.classList.contains('expanded');\n        area.querySelectorAll('.row-item').forEach(r=>{r.classList.remove('expanded');r.querySelector('.row-actions').style.display='none';});\n        if(!open){row.classList.add('expanded');row.querySelector('.row-actions').style.display='flex';}\n      });\n    });\n    area.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();editRecord(Number(b.dataset.edit));});\n    area.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();deleteRecord(Number(b.dataset.del));});\n    if($('showMoreTxnsBtn'))$('showMoreTxnsBtn').onclick=()=>{_showAllTxns=true;renderTable();};\n    if($('showLessTxnsBtn'))$('showLessTxnsBtn').onclick=()=>{_showAllTxns=false;renderTable();window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});};\n  }\n\n  function renderCatBudgetChart(){\n    const cont=$('catTrendCards');if(!cont)return;\n    const now=new Date(),lbl=[],keys=[];\n    for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);keys.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));lbl.push(d.toLocaleString(undefined,{month:'short'}));}\n    const pal=['#38bdf8','#fb923c','#a78bfa','#4ade80','#f472b6','#fbbf24','#34d399','#f87171'];\n    const cats=categories.filter(cat=>categoryBudgets[cat]>0||records.some(r=>r.category===cat&&(r.currency||'SGD')==='SGD'));\n    if(!cats.length){cont.innerHTML='';return;}\n\n    // Build legend items\n    const legendHtml=cats.map((cat,i)=>`\n      <span style=\"display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:11px;color:${pal[i%pal.length]};font-weight:600\">\n        <span style=\"display:inline-block;width:8px;height:8px;border-radius:50%;background:${pal[i%pal.length]}\"></span>\n        ${catEmoji(cat)} ${esc(cat)}${categoryBudgets[cat]>0?' ('+money(categoryBudgets[cat],'SGD')+')':''}\n      </span>`).join('');\n\n    cont.innerHTML=`\n      <div class=\"card\">\n        <div class=\"card-title\" style=\"margin-bottom:8px\">Category Trends</div>\n        <div style=\"display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px\">${legendHtml}</div>\n        <div class=\"chart-wrap\"><canvas id=\"catGroupCv\" width=\"600\" height=\"260\"></canvas></div>\n      </div>`;\n\n    const cv=$('catGroupCv');if(!cv)return;\n    const ctx=cv.getContext('2d');\n    // Compute all series\n    const series=cats.map(cat=>keys.map(k=>records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(k)&&r.category===cat).reduce((a,r)=>a+Number(r.amount||0),0)));\n    const allBudgets=cats.map(cat=>Number(categoryBudgets[cat]||0));\n    const max=Math.max(...series.flat(),...allBudgets,1);\n    const L=36,R=8,T=24,B=24,W=cv.width-L-R,H=cv.height-T-B;\n    // Grid + Y labels\n    for(let g=0;g<=4;g++){\n      const y=T+H/4*g,val=Math.round(max*(1-g/4));\n      ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(L+W,y);ctx.stroke();\n      ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='8px Inter,system-ui';ctx.textAlign='right';\n      ctx.fillText(val>=1000?(val/1000).toFixed(1)+'k':val,L-4,y+3);\n    }\n    // Budget dashed lines\n    cats.forEach((cat,i)=>{\n      const bgt=allBudgets[i];if(!bgt)return;\n      const y=T+H-(bgt/max)*H;\n      ctx.beginPath();ctx.setLineDash([4,3]);ctx.moveTo(L,y);ctx.lineTo(L+W,y);\n      ctx.strokeStyle=pal[i%pal.length]+'55';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);\n    });\n    // Lines + dots\n    series.forEach((vals,i)=>{\n      const col=pal[i%pal.length];\n      const pts=vals.map((v,j)=>({x:L+W/(vals.length-1)*j,y:T+H-(v/max)*H,v}));\n      ctx.beginPath();pts.forEach((p,j)=>j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));\n      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();\n      pts.forEach(p=>{\n        ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();\n        if(p.v>0){\n          const lbl2=p.v>=1000?(p.v/1000).toFixed(1)+'k':Math.round(p.v).toString();\n          ctx.fillStyle=col;ctx.font='bold 8px Inter,system-ui';ctx.textAlign='center';\n          ctx.fillText(lbl2,p.x,p.y-7);\n        }\n      });\n    });\n    // X labels\n    ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='9px Inter,system-ui';ctx.textAlign='center';\n    lbl.forEach((m,j)=>ctx.fillText(m,L+W/(lbl.length-1)*j,cv.height-6));\n  }\n\n  /* \u2500\u2500 AI Insight \u2500\u2500 */\n  /* \u2500\u2500 Smart Insight Engine \u2500\u2500 */\n  function computeInsight(){\n    const el=$('insightText'); if(!el) return;\n    const now2=new Date(),d2=now2.getDate(),dm2=new Date(now2.getFullYear(),now2.getMonth()+1,0).getDate();\n    const daysLeft=dm2-d2;\n\n    // This month\n    const sgd=records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(month()));\n    const myr=records.filter(r=>(r.currency||'SGD')==='MYR'&&r.date.startsWith(month()));\n    const spent=sgd.reduce((a,r)=>a+Number(r.amount||0),0);\n    const myrSpent=myr.reduce((a,r)=>a+Number(r.amount||0),0);\n\n    // Last month\n    const lastM=new Date(now2.getFullYear(),now2.getMonth()-1,1);\n    const lastKey=lastM.getFullYear()+'-'+String(lastM.getMonth()+1).padStart(2,'0');\n    const lastSpent=records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(lastKey)).reduce((a,r)=>a+Number(r.amount||0),0);\n\n    const m=catMap('SGD');\n    const cats=Object.entries(m).sort((a,b)=>b[1]-a[1]);\n    const topCat=cats[0];\n    const remain=budgetSGD>0?budgetSGD-spent:null;\n    const dailyAvg=d2>0?spent/d2:0;\n    const projected=dailyAvg*dm2;\n    const safeDaily=daysLeft>0?(remain??0)/daysLeft:0;\n    const pct=budgetSGD>0?spent/budgetSGD:0;\n\n    // Most expensive single transaction this month\n    const maxTxn=sgd.reduce((a,r)=>Number(r.amount)>Number(a?.amount||0)?r:a, null);\n    // Today's spending\n    const todayStr=today();\n    const todaySpent=sgd.filter(r=>r.date===todayStr).reduce((a,r)=>a+Number(r.amount||0),0);\n    // Txn count\n    const txnCount=sgd.length;\n\n    if(!records.some(r=>r.date.startsWith(month()))){\n      el.innerHTML='<span style=\"opacity:.6\">No transactions yet this month. Start logging to unlock spending insights.</span>';\n      return;\n    }\n\n    const lines=[];\n\n    // Budget health\n    if(remain!==null){\n      if(remain<0)\n        lines.push(`\ud83d\udea8 <strong>S$${Math.abs(remain).toFixed(0)} over budget</strong> \u2014 cut back on ${topCat?topCat[0]:'spending'} to recover.`);\n      else if(pct>=0.8)\n        lines.push(`\u26a0\ufe0f <strong>${Math.round(pct*100)}% of budget used</strong> with ${daysLeft}d left. Safe daily limit: <strong>S$${safeDaily.toFixed(0)}/day</strong>.`);\n      else\n        lines.push(`\u2705 <strong>${Math.round(pct*100)}% of budget used</strong>. You have <strong>S$${remain.toFixed(0)}</strong> left for ${daysLeft} days (<strong>S$${safeDaily.toFixed(0)}/day</strong>).`);\n    }\n\n    // Projection vs budget\n    if(budgetSGD>0&&projected>budgetSGD&&remain>0)\n      lines.push(`\ud83d\udcc8 At S$${dailyAvg.toFixed(0)}/day you're projected to spend <strong>S$${projected.toFixed(0)}</strong> \u2014 <strong>S$${(projected-budgetSGD).toFixed(0)} over budget</strong>.`);\n    else if(dailyAvg>0&&!budgetSGD)\n      lines.push(`\ud83d\udcc8 Daily average <strong>S$${dailyAvg.toFixed(0)}/day</strong> \u2192 projected month total: <strong>S$${projected.toFixed(0)}</strong>.`);\n\n    // vs last month\n    if(lastSpent>0){\n      const diff=spent-lastSpent;\n      const pctDiff=Math.abs(diff/lastSpent*100).toFixed(0);\n      lines.push(diff>0\n        ? `\ud83d\udcca Spending <strong>${pctDiff}% more</strong> than last month (S$${lastSpent.toFixed(0)} \u2192 <strong>S$${spent.toFixed(0)}</strong>).`\n        : `\ud83d\udcca Spending <strong>${pctDiff}% less</strong> than last month (S$${lastSpent.toFixed(0)} \u2192 <strong>S$${spent.toFixed(0)}</strong>). ${diff<-lastSpent*0.2?'Great discipline!':''}`\n      );\n    }\n\n    // Top category breakdown\n    if(cats.length>=2&&spent>0)\n      lines.push(`\ud83c\udfc6 Top spend: <strong>${cats[0][0]}</strong> S$${cats[0][1].toFixed(0)} (${Math.round(cats[0][1]/spent*100)}%), then <strong>${cats[1][0]}</strong> S$${cats[1][1].toFixed(0)} (${Math.round(cats[1][1]/spent*100)}%).`);\n    else if(topCat&&spent>0)\n      lines.push(`\ud83c\udfc6 <strong>${topCat[0]}</strong> is your biggest category at <strong>S$${topCat[1].toFixed(0)}</strong> (${Math.round(topCat[1]/spent*100)}% of SGD spend).`);\n\n    // Biggest single transaction\n    if(maxTxn&&Number(maxTxn.amount)>0)\n      lines.push(`\ud83d\udcb3 Largest transaction: <strong>S$${Number(maxTxn.amount).toFixed(2)}</strong> on ${maxTxn.category}${maxTxn.note?' ('+maxTxn.note+')':''} on ${maxTxn.date}.`);\n\n    // Today\n    if(todaySpent>0)\n      lines.push(`\ud83d\udcc5 You've spent <strong>S$${todaySpent.toFixed(2)} today</strong> across ${sgd.filter(r=>r.date===todayStr).length} transaction${sgd.filter(r=>r.date===todayStr).length>1?'s':''}.`);\n\n    // MYR\n    if(myrSpent>0)\n      lines.push(`\ud83d\udcb1 MYR this month: <strong>RM ${myrSpent.toFixed(2)}</strong> across ${myr.length} transaction${myr.length>1?'s':''}.`);\n\n    // Transaction frequency\n    if(txnCount>0)\n      lines.push(`\ud83d\udd22 <strong>${txnCount} SGD transaction${txnCount>1?'s':''}</strong> logged this month \u2014 averaging <strong>${(txnCount/d2).toFixed(1)} per day</strong>.`);\n\n    el.innerHTML=lines.slice(0,4).join('<br><br>');\n  }\n\n  /* \u2500\u2500 Number pop animation \u2500\u2500 */\n  function popEl(id){const el=$(id);if(!el)return;el.classList.remove('num-pop');void el.offsetWidth;el.classList.add('num-pop');}\n\n  function renderAll(){renderDashboard();renderTrendChart();renderRecent();renderTable();computeInsight();}\n\n  /* \u2500\u2500 Currency toggle \u2500\u2500 */\n  function setCurrency(c){\n    $('currencyInput').value=c;\n    $('chipSGD').className='ccy-chip'+(c==='SGD'?' active-sgd':'');\n    $('chipMYR').className='ccy-chip'+(c==='MYR'?' active-myr':'');\n    $('amountPrefix').textContent=c==='MYR'?'RM':'S$';\n  }\n\n  /* \u2500\u2500 Form \u2500\u2500 */\n  function clearForm(){\n    editingId=null;\n    $('saveBtn').textContent='Save Transaction';\n    $('saveBtn').className='btn-save';\n    $('dateInput').value=today();\n    $('categoryInput').value=categories[0]||'';\n    $('amountInput').value='';\n    setCurrency('SGD');\n    $('noteInput').value='';\n    setStatus('');\n  }\n\n  function saveTxn(e){\n    e.preventDefault();\n    const date=$('dateInput').value,category=$('categoryInput').value,amount=parseFloat($('amountInput').value),currency=$('currencyInput').value||'SGD',note=$('noteInput').value;\n    if(!date||!category||isNaN(amount)||amount<=0)return setStatus('Please fill in all required fields.');\n    if(editingId){const r=records.find(x=>x.id===editingId);if(r)Object.assign(r,{date,category,amount,currency,note});}\n    else records.unshift({id:Date.now(),date,category,amount,currency,note});\n    save();clearForm();renderAll();checkBudgetAlerts();\n    setStatus('\u2713 Saved!');\n  }\n\n  function editRecord(id){\n    const r=records.find(x=>x.id===id);if(!r)return;\n    editingId=id;\n    $('saveBtn').textContent='Update Transaction';\n    $('saveBtn').className='btn-save editing';\n    $('dateInput').value=r.date;\n    $('categoryInput').value=r.category;\n    $('amountInput').value=r.amount;\n    setCurrency(r.currency||'SGD');\n    $('noteInput').value=r.note||'';\n    // Switch to dashboard and scroll form into view\n    switchTab('dashboardTab');\n    setTimeout(()=>$('amountInput').scrollIntoView({behavior:'smooth',block:'center'}),100);\n    $('amountInput').focus();\n  }\n\n  const _pd=new Set();\n  function deleteRecord(id){\n    if(!_pd.has(id)){\n      _pd.add(id);\n      document.querySelectorAll(`[data-del=\"${id}\"],[data-recent-del=\"${id}\"]`).forEach(b=>b.textContent='Confirm?');\n      setTimeout(()=>{if(_pd.has(id)){_pd.delete(id);document.querySelectorAll(`[data-del=\"${id}\"],[data-recent-del=\"${id}\"]`).forEach(b=>b.textContent='Delete');}},3000);\n      return;\n    }\n    _pd.delete(id);records=records.filter(r=>r.id!==id);save();renderAll();\n  }\n\n  function switchTab(id,keepFilters=false){\n    ['dashboardTab','addTab'].forEach(t=>$(t).className=t===id?'tab-section active':'tab-section');\n    ['navDashboard','navAdd'].forEach(n=>{const el=$(n);if(el)el.classList.remove('active');});\n    ['dotDashboard','dotAdd'].forEach(n=>{const el=$(n);if(el)el.classList.remove('active');});\n    const m={'dashboardTab':'navDashboard','addTab':'navAdd'};\n    const dm={'dashboardTab':'dotDashboard','addTab':'dotAdd'};\n    const n=$(m[id]);if(n)n.classList.add('active');\n    const d=$(dm[id]);if(d)d.classList.add('active');\n    const underline=$('tabUnderline');\n    if(underline) underline.className='top-tab-underline'+(id==='addTab'?' pos-1':'');\n    if(id==='addTab'&&!keepFilters){$('filterMonth').value='';$('filterCurrency').value='';$('filterCategory').value='';renderTable();}\n    if(id==='addTab'){computeInsight();renderCatBudgetChart();renderTrendChart();}\n    if(id!=='addTab'){_showAllTxns=false;}\n    window.scrollTo({top:0,behavior:'smooth'});\n  }\n\n\n  /* \u2500\u2500 Init \u2500\u2500 */\n  load();refreshCategories();clearForm();populateMonthFilter();renderAll();\n\n  /* \u2500\u2500 Populate month filter \u2500\u2500 */\n  function populateMonthFilter(){\n    const sel=$('filterMonth');\n    const now=new Date();\n    let opts='<option value=\"\">All</option>';\n    for(let i=0;i<24;i++){\n      const d=new Date(now.getFullYear(),now.getMonth()-i,1);\n      const val=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');\n      const lbl=d.toLocaleString(undefined,{month:'short',year:'numeric'});\n      opts+=`<option value=\"${val}\">${lbl}</option>`;\n    }\n    sel.innerHTML=opts;\n  }\n  let _savedScroll=0;\n  document.querySelectorAll('#txnForm input, #txnForm select').forEach(el=>{\n    el.addEventListener('focus',()=>{ _savedScroll=window.scrollY; }, {passive:true});\n    el.addEventListener('blur',()=>{ requestAnimationFrame(()=>window.scrollTo({top:_savedScroll})); }, {passive:true});\n  });\n\n  /* \u2500\u2500 Events \u2500\u2500 */\n  $('txnForm').addEventListener('submit',saveTxn);\n  $('chipSGD').onclick=()=>setCurrency('SGD');\n  $('chipMYR').onclick=()=>setCurrency('MYR');\n  $('navDashboard').onclick=()=>switchTab('dashboardTab');\n  $('navAdd').onclick=()=>switchTab('addTab');\n  $('dotDashboard').onclick=()=>switchTab('dashboardTab');\n  $('dotAdd').onclick=()=>switchTab('addTab');\n  $('filterMonth').onchange=()=>{_showAllTxns=false;renderTable();};\n  $('filterCurrency').onchange=()=>{_showAllTxns=false;renderTable();};\n  $('filterCategory').onchange=()=>{_showAllTxns=false;renderTable();};\n  $('resetFilterBtn').onclick=()=>{$('filterMonth').value='';$('filterCurrency').value='';$('filterCategory').value='';_showAllTxns=false;renderTable();};\n  $('clearAllBtn').onclick=()=>{if(confirm('Clear all data?')){records=[];save();renderAll();}};\n  $('saveBudgetBtn').onclick=()=>{const a=parseFloat($('budgetAmountInput').value);if(isNaN(a)||a<0)return setStatus('Enter a valid amount.');budgetSGD=a;$('budgetAmountInput').value='';save();renderAll();setStatus('Budget saved.');};\n  $('clearBudgetBtn').onclick=()=>{budgetSGD=0;save();renderAll();setStatus('Budget cleared.');};\n  $('saveCategoryBudgetBtn').onclick=()=>{const cat=$('budgetCategoryInput').value,a=parseFloat($('categoryBudgetAmountInput').value);if(!cat||isNaN(a)||a<0)return setStatus('Fill both fields.');categoryBudgets[cat]=a;$('categoryBudgetAmountInput').value='';save();renderAll();setStatus('Category budget saved.');};\n  $('clearCategoryBudgetsBtn').onclick=()=>{categoryBudgets={};save();renderAll();setStatus('Cleared.');};\n  $('addCategoryBtn').onclick=()=>{\n    const n=$('newCategoryInput').value.trim();\n    if(!n)return setStatus('Enter a name.');\n    if(selectedCategory&&selectedCategory!==n){\n      categories=categories.map(c=>c===selectedCategory?n:c);\n      records.forEach(r=>{if(r.category===selectedCategory)r.category=n;});\n      if(categoryBudgets[selectedCategory]!==undefined){categoryBudgets[n]=categoryBudgets[selectedCategory];delete categoryBudgets[selectedCategory];}\n    } else if(!categories.some(c=>c.toLowerCase()===n.toLowerCase())){\n      categories.push(n);\n    } else {\n      return setStatus('Already exists.');\n    }\n    $('newCategoryInput').value='';selectedCategory='';\n    save();refreshCategories();renderAll();setStatus('Saved.');\n  };\n  $('deleteCategoryBtn').onclick=()=>{\n    const n=(selectedCategory||$('newCategoryInput').value.trim());\n    if(!n)return setStatus('Tap a category pill first.');\n    if(!categories.includes(n))return setStatus('\"'+n+'\" not found.');\n    const affected=records.filter(r=>r.category===n).length;\n    records.forEach(r=>{if(r.category===n)r.category='Miscellaneous';});\n    categories=categories.filter(c=>c!==n);\n    delete categoryBudgets[n];\n    $('newCategoryInput').value='';\n    selectedCategory='';\n    save();refreshCategories();renderAll();\n    setStatus('\"'+n+'\" deleted.'+(affected?` ${affected} transaction${affected>1?'s':''} moved to Miscellaneous.`:''));\n  };\n\n  document.querySelectorAll('.ccy-card[data-filter]').forEach(box=>{\n    box.addEventListener('click',()=>{$('filterCurrency').value=box.dataset.filter;$('filterMonth').value=month();$('filterCategory').value='';renderTable();switchTab('addTab',true);});\n  });\n\n  // Swipe between tabs\n  let sx=0,sy=0,st=0;\n  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});\n  document.addEventListener('touchend',e=>{\n    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;\n    if(dt>400||Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<55)return;\n    const tabs=['dashboardTab','addTab'],active=tabs.findIndex(t=>$(t).classList.contains('active'));\n    if(dx<0&&active<tabs.length-1)switchTab(tabs[active+1]);\n    else if(dx>0&&active>0)switchTab(tabs[active-1]);\n  },{passive:true});\n\n\n  /* \u2500\u2500 Unified backup/restore bridge (postMessage) \u2500\u2500 */\n  window.addEventListener('message', function(ev){\n    if(!ev.data || typeof ev.data !== 'object') return;\n    if(ev.data.type === 'EXPENSE_REQUEST_EXPORT'){\n      try{\n        parent.postMessage({ type:'EXPENSE_EXPORT_DATA', payload:{records,categories,budgetSGD,categoryBudgets} }, '*');\n      }catch(e){}\n    }\n    if(ev.data.type === 'EXPENSE_IMPORT_DATA'){\n      try{\n        const d = ev.data.payload || {};\n        records = Array.isArray(d.records) ? d.records.map(r=>({...r,currency:r.currency||'SGD'})) : records;\n        categories = Array.isArray(d.categories) && d.categories.length ? d.categories : categories;\n        budgetSGD = Number(d.budgetSGD || 0);\n        categoryBudgets = d.categoryBudgets || {};\n        save();\n        refreshCategories();\n        clearForm();\n        renderAll();\n        parent.postMessage({ type:'EXPENSE_IMPORT_DONE' }, '*');\n      }catch(e){\n        parent.postMessage({ type:'EXPENSE_IMPORT_DONE', error: String(e) }, '*');\n      }\n    }\n  });\n\n})();\n" + "</scr" + "ipt>" + "\n</body>\n</html>\n";

const fmt = (dt) => dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

const offsetDate = (n) => { const x=new Date(todayDate); x.setDate(x.getDate()+n); return x.toISOString().split("T")[0]; };

function parseDue(str){if(!str)return null;const[y,m,d]=str.split("-").map(Number);return new Date(y,m-1,d);}
function daysUntil(str){if(!str)return null;return Math.floor((parseDue(str)-todayDate)/86400000);}
function dueStatus(item){
  if(!item.dueDate||item.done)return null;
  const d=daysUntil(item.dueDate);
  if(d<0)return"overdue";if(d===0)return"today";if(d<=2)return"soon";return"ok";
}
function dueLabel(str){
  const d=daysUntil(str);if(d===null)return"";
  if(d<0)return`${Math.abs(d)}d overdue`;if(d===0)return"Due today";if(d===1)return"Due tomorrow";
  return`Due in ${d}d`;
}
function dueBadge(status){
  const R={bg:"rgba(239,68,68,0.1)",border:"#EF444455",text:"#EF4444"};
  const A={bg:"rgba(245,158,11,0.12)",border:"#F59E0B55",text:"#F59E0B"};
  const B={bg:"rgba(56,182,232,0.12)",border:"#38b6e855",text:"#38b6e8"};
  if(status==="overdue"||status==="today")return R;if(status==="soon")return A;return B;
}

function LeaveReminderBanner({unsubmittedLeave,stacked}){

  useEffect(()=>{if(contentRef.current)setHalfW(contentRef.current.scrollWidth/2);});

    const tick=(ts)=>{
      if(prevTs.current!==null)setOffset(p=>halfW>0?(p+40*(ts-prevTs.current)/1000)%halfW:0);
      prevTs.current=ts;rafRef.current=requestAnimationFrame(tick);
    };
    rafRef.current=requestAnimationFrame(tick);
    return()=>{cancelAnimationFrame(rafRef.current);prevTs.current=null;};

function SwipeBack({onBack,children}){
  const sx=useRef(null),sy=useRef(null);
  return(
    <div
      onTouchStart={e=>{sx.current=e.touches[0].clientX;sy.current=e.touches[0].clientY;}}
      onTouchEnd={e=>{
        if(!sx.current)return;
        const dx=e.changedTouches[0].clientX-sx.current,dy=Math.abs(e.changedTouches[0].clientY-sy.current);
        if(dx>60&&dy<80)onBack();sx.current=null;
      }}
      style={{minHeight:"100vh"}}
    >{children}</div>
  );
}
