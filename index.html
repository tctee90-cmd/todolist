  { id:"annual", label:"Annual Leave", total:38, used:22, unit:"days", color:"#00c896", broughtForward:0, bfExpiry:"" },
  { id:"sick",   label:"Sick Leave",   total:14, used:8,  unit:"days", color:"#10B981" },
  { id:"timeoff",label:"Time Off",     total:0,  used:26.25, unit:"hours", color:"#F59E0B" },
  { id:"ccl",    label:"CCL",          total:1,  used:0,  unit:"days", color:"#A78BFA" },
  { id:"phil",   label:"PHIL",         total:1,  used:0,  unit:"days", color:"#F472B6" },
];

const LEAVE_COLORS = ["#00c896","#10B981","#F59E0B","#A78BFA","#F472B6","#EF4444","#34D399","#FB923C"];

function LeaveTracker({onLogsChanged}){
  const ff2 = ff;
  const[now,setNow]=useState(new Date());
  useEffect(()=>{
    const t=setInterval(()=>setNow(new Date()),1000);
    return()=>clearInterval(t);
  },[]);
  const[leaves,setLeavesRaw]=useState(()=>{
    try{const s=localStorage.getItem("mytasks_leaves");return s?JSON.parse(s):LEAVE_TYPES_DEFAULT;}catch{return LEAVE_TYPES_DEFAULT;}
  });
  const[logs,setLogsRaw]=useState(()=>{
    try{const s=localStorage.getItem("mytasks_leave_logs");return s?JSON.parse(s):[];}catch{return[];}
  });
  const[leaveTab,setLeaveTab]=useState("balance"); // balance | calendar | history
  const[logModal,setLogModal]=useState(null);
  const[logAmt,setLogAmt]=useState("");
  const[logDate,setLogDate]=useState(new Date().toISOString().split("T")[0]);
  const[logDateTo,setLogDateTo]=useState("");
  const[logReason,setLogReason]=useState("");
  const[logSubmitted,setLogSubmitted]=useState(false);
  const[editModal,setEditModal]=useState(null);
  const[addModal,setAddModal]=useState(false);
  const[newLabel,setNewLabel]=useState("");
  const[newTotal,setNewTotal]=useState("");
  const[newUnit,setNewUnit]=useState("days");
  const[newColor,setNewColor]=useState("#00c896");

  const setLeaves=(v)=>setLeavesRaw(p=>{const n=typeof v==="function"?v(p):v;try{localStorage.setItem("mytasks_leaves",JSON.stringify(n));}catch{}return n;});
  const setLogs=(v)=>setLogsRaw(p=>{const n=typeof v==="function"?v(p):v;try{localStorage.setItem("mytasks_leave_logs",JSON.stringify(n));}catch{}return n;});

  const openLog=(l)=>{
    setLogModal(l);
    setLogAmt("");
    setLogDate(new Date().toISOString().split("T")[0]);
    setLogDateTo("");
    setLogReason("");
    setLogSubmitted(false);
  };

  const confirmLog=()=>{
    if(!logModal||!logAmt||!logDate)return;
    const amt=parseFloat(logAmt);
    // Auto-calc week label from date
    const d=new Date(logDate);
    const weekNum=Math.ceil((((d-new Date(d.getFullYear(),0,1))/86400000)+new Date(d.getFullYear(),0,1).getDay()+1)/7);
    const weekLabel=`W${weekNum} ${d.getFullYear()}`;
    const newLog={
      id:Date.now(),leaveId:logModal.id,label:logModal.label,color:logModal.color,
      amt,unit:logModal.unit,
      date:logDate,
      dateTo:logDateTo||"",
      reason:logReason.trim(),
      week:weekLabel,
      submitted:logSubmitted,
    };
    setLogs(p=>[newLog,...p]);
    setLeaves(p=>p.map(l=>l.id===logModal.id?{...l,used:parseFloat((l.used+amt).toFixed(2))}:l));
    setLogModal(null);
    onLogsChanged?.();
  };

  const deleteLog=(logId,leaveId,amt)=>{
    setLogs(p=>p.filter(l=>l.id!==logId));
    setLeaves(p=>p.map(l=>l.id===leaveId?{...l,used:Math.max(0,parseFloat((l.used-amt).toFixed(2)))}:l));
    onLogsChanged?.();
  };

  const toggleSubmitted=(logId)=>{
    setLogs(p=>p.map(l=>l.id===logId?{...l,submitted:!l.submitted}:l));
    onLogsChanged?.();
  };

  const addType=()=>{
    if(!newLabel.trim())return;
    setLeaves(p=>[...p,{id:Date.now().toString(),label:newLabel.trim(),total:parseFloat(newTotal)||0,used:0,unit:newUnit,color:newColor}]);
    setNewLabel("");setNewTotal("");setNewUnit("days");setAddModal(false);
  };

  const saveEdit=(e)=>{
    setLeaves(p=>p.map(l=>l.id===e.id?e:l));
    setEditModal(null);
  };

  const deleteLeave=(id)=>{
    setLeaves(p=>p.filter(l=>l.id!==id));
    setLogs(p=>p.filter(l=>l.leaveId!==id));
    setEditModal(null);
  };

  const leaveSwipeX=useRef(null);
  const leaveSwipeY=useRef(null);
  const leaveTabs=["balance","history"];

  const onLeaveSwipeStart=(e)=>{ leaveSwipeX.current=e.touches[0].clientX; leaveSwipeY.current=e.touches[0].clientY; };
  const onLeaveSwipeEnd=(e)=>{
    if(leaveSwipeX.current===null)return;
    const dx=e.changedTouches[0].clientX-leaveSwipeX.current;
    const dy=Math.abs(e.changedTouches[0].clientY-leaveSwipeY.current);
    if(Math.abs(dx)>50&&dy<80){
      const tabs=["balance","history"];
      setLeaveTab(cur=>{
        const idx=tabs.indexOf(cur);
        if(dx<0&&idx<tabs.length-1) return tabs[idx+1];
        if(dx>0&&idx>0) return tabs[idx-1];
        return cur;
      });
    }
    leaveSwipeX.current=null;
  };

  const G={bg:C.bg,card:C.card,border:C.border,text:C.text,muted:C.muted,subtle:C.subtle};

  return(
    <div
      onTouchStart={onLeaveSwipeStart}
      onTouchEnd={onLeaveSwipeEnd}
      style={{minHeight:"100vh",background:G.bg,fontFamily:ff2,paddingBottom:100}}>

      {/* Header */}
      <div style={{background:"linear-gradient(160deg,#0F1729 0%,#0B0E18 60%)",borderBottom:`1px solid ${G.border}`,position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg, transparent 5%, rgba(0,200,150,.6) 30%, rgba(56,182,232,.9) 55%, rgba(0,200,150,.6) 75%, transparent 95%)"}}/>
        <div style={{maxWidth:480,margin:"0 auto",padding:"22px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <h1 style={{margin:0,fontSize:22,fontWeight:900,letterSpacing:"-0.04em",lineHeight:1.15,color:C.text}}>Leave <span style={SHINE_TEXT}>Entitlement</span></h1>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:17,fontWeight:800,color:C.text,letterSpacing:"-0.02em",lineHeight:1,fontFamily:ffMono}}>
              {now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
            </div>
            <div style={{fontSize:11,color:C.muted,fontWeight:500,marginTop:3}}>
              {now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}
            </div>
          </div>
        </div>
      </div>
      {/* Top tab bar — text tabs, own row matching Expense Tracker .top-tabs sibling */}
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px",display:"grid",gridTemplateColumns:"1fr 1fr",position:"relative"}}>
        {["balance","history"].map((t,i)=>{
          const on=leaveTab===t;
          const label=t==="balance"?"Balance":"History";
          return(
            <button key={t} onClick={()=>setLeaveTab(t)} style={{
              height:34,border:"none",background:"none",cursor:"pointer",
              fontFamily:ff2,fontSize:14,fontWeight:700,letterSpacing:"0.01em",
              color:on?"#FFF":"rgba(255,255,255,.35)",transition:"color .25s",
            }}>{label}</button>
          );
        })}
      </div>
      {/* Sliding underline track */}
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px"}}>
        <div style={{height:1,background:"rgba(255,255,255,.08)",position:"relative"}}>
          <div style={{
            height:2,width:"50%",background:"#FFF",
            boxShadow:"0 0 8px rgba(255,255,255,.5)",
            transition:"transform .3s cubic-bezier(.22,1,.36,1)",
            transform:leaveTab==="history"?"translateX(100%)":"translateX(0%)",
          }}/>
        </div>
      </div>
      {/* Dots */}
      <div style={{display:"flex",justifyContent:"center",gap:5,padding:"10px 0 8px"}}>
        {leaveTabs.map(t=>(
          <div key={t} onClick={()=>setLeaveTab(t)} style={{width:leaveTab===t?18:6,height:6,borderRadius:3,background:leaveTab===t?"#FFF":"rgba(255,255,255,.15)",transition:"all 0.25s",cursor:"pointer"}}/>
        ))}
      </div>

      <div style={{padding:"12px 20px",maxWidth:480,margin:"0 auto"}}>

        {/* ── BALANCE TAB ── */}
        {leaveTab==="balance"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <p style={{margin:0,fontSize:11,fontWeight:700,color:G.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Entitlements</p>
              <button onClick={()=>setAddModal(true)} style={{padding:"5px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.85)",fontFamily:ff2,fontSize:"12px",fontWeight:700,cursor:"pointer"}}>+ Add</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {leaves.map(l=>{
                const bf = l.broughtForward || 0;
                const bfExpired = l.bfExpiry && new Date(l.bfExpiry) < new Date();
                const effectiveBf = (bf > 0 && !bfExpired) ? bf : 0;
                const effectiveTotal = l.total + effectiveBf;
                const isUncapped = effectiveTotal <= 0; // no entitlement set — e.g. "Time Off" tracked as a running tally
                const remaining=Math.max(0,parseFloat((effectiveTotal-l.used).toFixed(2)));
                const pct=effectiveTotal>0?Math.min(100,Math.round((l.used/effectiveTotal)*100)):0;
                const warn=pct>=80;
                return(
                  <div key={l.id} style={{background:G.card,borderRadius:16,border:`1px solid ${G.border}`,padding:"16px",position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,left:0,bottom:0,width:4,background:l.color,borderRadius:"16px 0 0 16px"}}/>
                    <div style={{paddingLeft:12}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                        <div>
                          <div style={{fontSize:14,fontWeight:700,color:G.text}}>{l.label}</div>
                          {isUncapped ? (
                            <div style={{fontSize:11,color:G.muted,marginTop:2}}>
                              <span style={{color:l.color,fontWeight:700,fontSize:20}}>{l.used}</span>
                              <span style={{marginLeft:4}}>{l.unit} used</span>
                            </div>
                          ) : (
                            <div style={{fontSize:11,color:G.muted,marginTop:2}}>
                              <span style={{color:warn?"#EF4444":l.color,fontWeight:700,fontSize:20}}>{remaining}</span>
                              <span style={{marginLeft:4}}>{l.unit} left</span>
                            </div>
                          )}
                          {effectiveBf>0&&(
                            <div style={{fontSize:10,marginTop:4,display:"flex",alignItems:"center",gap:4}}>
                              <span style={{width:6,height:6,borderRadius:"50%",background:"#F59E0B",display:"inline-block",flexShrink:0}}/>
                              <span style={{color:"#F59E0B",fontWeight:600}}>+{effectiveBf} brought forward</span>
                              {l.bfExpiry&&<span style={{color:G.muted}}>· expires {l.bfExpiry}</span>}
                            </div>
                          )}
                          {bf>0&&bfExpired&&(
                            <div style={{fontSize:10,color:"#EF4444",marginTop:3}}>⚠ Brought forward expired</div>
                          )}
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>openLog(l)} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${l.color}44`,background:`${l.color}15`,color:l.color,fontFamily:ff2,fontSize:"11px",fontWeight:700,cursor:"pointer"}}>Log</button>
                          <button onClick={()=>setEditModal({...l})} style={{padding:"5px 8px",borderRadius:8,border:`1px solid ${G.border}`,background:"transparent",color:G.muted,fontFamily:ff2,fontSize:"11px",cursor:"pointer"}}>✎</button>
                        </div>
                      </div>
                      {!isUncapped && effectiveTotal>0&&(
                        <>
                          <div style={{height:5,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden",marginBottom:5}}>
                            {/* Show brought-forward portion in amber */}
                            {effectiveBf>0&&<div style={{position:"relative",height:"100%"}}>
                              <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${Math.round((l.total/effectiveTotal)*100)}%`,background:l.color}}/>
                              <div style={{position:"absolute",right:0,top:0,bottom:0,width:`${Math.round((effectiveBf/effectiveTotal)*100)}%`,background:"#F59E0B"}}/>
                              <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,background:warn?`linear-gradient(90deg,${l.color},#EF4444)`:l.color,opacity:0.9}}/>
                            </div>}
                            {effectiveBf===0&&<div style={{height:"100%",width:`${pct}%`,background:warn?`linear-gradient(90deg,${l.color},#EF4444)`:l.color,borderRadius:3,transition:"width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)"}}/>}
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:G.muted}}>
                            <span>Used <span style={{fontWeight:600,color:warn?"#EF4444":G.subtle}}>{l.used} {l.unit}</span></span>
                            <span style={{fontWeight:700,color:warn?"#EF4444":G.muted}}>{pct}%</span>
                            <span>Total <span style={{fontWeight:600,color:G.subtle}}>{effectiveTotal}{effectiveBf>0?` (${l.total}+${effectiveBf})`:""} {l.unit}</span></span>
                          </div>
                        </>
                      )}
                      {isUncapped&&(
                        <div style={{fontSize:10,color:G.muted}}>No entitlement cap set — tracked as a running total.</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── HISTORY TAB ── */}
        {leaveTab==="history"&&(
          <div>
            {logs.length===0?(
              <div style={{padding:"48px 0",textAlign:"center",color:G.muted,fontSize:13}}>No leave logged yet</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {logs.sort((a,b)=>b.date.localeCompare(a.date)).map(l=>(
                  <div key={l.id} style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,overflow:"hidden"}}>
                    <div style={{height:3,background:l.color}}/>
                    <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                          <span style={{fontSize:14,fontWeight:700,color:G.text}}>{l.label}</span>
                          <span style={{fontSize:16,fontWeight:800,color:l.color}}>−{l.amt} {l.unit}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:l.reason?4:6}}>
                          {l.week&&<span style={{fontSize:10,fontWeight:700,color:l.color,background:`${l.color}15`,padding:"2px 7px",borderRadius:20}}>{l.week}</span>}
                          <span style={{fontSize:11,color:G.muted}}>
                            {l.date}{l.dateTo&&l.dateTo!==l.date?` → ${l.dateTo}`:""}
                          </span>
                        </div>
                        {l.reason&&<div style={{fontSize:12,color:G.muted,fontStyle:"italic",marginBottom:6}}>"{l.reason}"</div>}
                        <button onClick={()=>toggleSubmitted(l.id)} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:20,border:`1px solid ${l.submitted?"#00c89655":"#EF444455"}`,background:l.submitted?"rgba(0,200,150,0.1)":"rgba(239,68,68,0.1)",cursor:"pointer",fontFamily:ff2}}>
                          <span style={{width:6,height:6,borderRadius:"50%",background:l.submitted?"#00c896":"#EF4444",flexShrink:0}}/>
                          <span style={{fontSize:10,fontWeight:700,color:l.submitted?"#00c896":"#EF4444"}}>{l.submitted?"Submitted":"Not submitted"}</span>
                        </button>
                      </div>
                      <button onClick={()=>deleteLog(l.id,l.leaveId,l.amt)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(239,68,68,0.35)",fontSize:18,padding:"0 2px",flexShrink:0,marginTop:2}}>×</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── LOG MODAL ── */}
      {logModal&&(
        <div onClick={()=>setLogModal(null)} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:G.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,border:`1px solid ${G.border}`,borderBottom:"none",padding:"24px 20px 40px",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,background:G.border,borderRadius:2,margin:"0 auto 20px"}}/>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:logModal.color,flexShrink:0}}/>
              <h3 style={{margin:0,fontSize:18,fontWeight:800,color:G.text}}>Log {logModal.label}</h3>
            </div>

            {/* From — To dates on same row */}
            <div style={{marginBottom:14}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:G.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Date</p>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 4px",fontSize:10,color:G.muted}}>From</p>
                  <input type="date" value={logDate} onChange={e=>{setLogDate(e.target.value);if(!logDateTo)setLogDateTo(e.target.value);}}
                    style={{width:"100%",padding:"11px 12px",fontSize:"16px",background:G.bg,border:`1px solid ${logModal.color}55`,borderRadius:10,color:G.text,outline:"none",fontFamily:ff2}}/>
                </div>
                <div style={{fontSize:13,color:G.muted,paddingTop:18}}>→</div>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 4px",fontSize:10,color:G.muted}}>To (optional)</p>
                  <input type="date" value={logDateTo} onChange={e=>setLogDateTo(e.target.value)} min={logDate}
                    style={{width:"100%",padding:"11px 12px",fontSize:"16px",background:G.bg,border:`1px solid ${G.border}`,borderRadius:10,color:G.text,outline:"none",fontFamily:ff2}}/>
                </div>
              </div>
              {/* Auto week label */}
              {logDate&&(()=>{
                const d=new Date(logDate);
                const wn=Math.ceil((((d-new Date(d.getFullYear(),0,1))/86400000)+new Date(d.getFullYear(),0,1).getDay()+1)/7);
                return <p style={{margin:"6px 0 0",fontSize:11,color:G.muted}}>📅 Week {wn} of {d.getFullYear()}</p>;
              })()}
            </div>

            {/* Amount */}
            <div style={{marginBottom:14}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:G.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Amount ({logModal.unit})</p>
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                {[0.5,1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setLogAmt(String(n))} style={{flex:1,padding:"9px 0",borderRadius:9,border:`1px solid ${logAmt==n?logModal.color:G.border}`,background:logAmt==n?`${logModal.color}20`:"transparent",color:logAmt==n?logModal.color:G.muted,fontFamily:ff2,fontWeight:700,fontSize:"12px",cursor:"pointer"}}>{n}</button>
                ))}
              </div>
              <input type="number" step="0.5" min="0" value={logAmt} onChange={e=>setLogAmt(e.target.value)} placeholder="Custom amount"
                style={{width:"100%",padding:"11px 14px",fontSize:"16px",background:G.bg,border:`1px solid ${G.border}`,borderRadius:10,color:G.text,outline:"none",fontFamily:ff2}}/>
            </div>

            {/* Reason */}
            <div style={{marginBottom:16}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:G.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Reason <span style={{textTransform:"none",fontWeight:400,color:"#334155"}}>(optional)</span></p>
              <input value={logReason} onChange={e=>setLogReason(e.target.value)} placeholder="e.g. Family trip to Bali, Medical appointment…"
                style={{width:"100%",padding:"11px 14px",fontSize:"16px",background:G.bg,border:`1px solid ${G.border}`,borderRadius:10,color:G.text,outline:"none",fontFamily:ff2}}/>
            </div>

            {/* Submitted toggle */}
            <div style={{marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:10,background:G.bg,border:`1px solid ${G.border}`}}>
              <div>
                <p style={{margin:0,fontSize:13,fontWeight:700,color:G.text}}>Leave submitted?</p>
                <p style={{margin:"2px 0 0",fontSize:11,color:G.muted}}>{logSubmitted?"Marked as submitted":"You'll get a reminder until submitted"}</p>
              </div>
              <button onClick={()=>setLogSubmitted(s=>!s)} style={{width:46,height:26,borderRadius:13,border:"none",cursor:"pointer",background:logSubmitted?"#00c896":"rgba(255,255,255,.15)",position:"relative",transition:"background .2s",flexShrink:0}}>
                <div style={{position:"absolute",top:2,left:logSubmitted?22:2,width:22,height:22,borderRadius:"50%",background:"#FFF",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.4)"}}/>
              </button>
            </div>

            <button onClick={confirmLog} disabled={!logAmt||!logDate} style={{width:"100%",padding:"15px",borderRadius:12,border:"none",fontFamily:ff2,fontSize:"15px",fontWeight:700,cursor:logAmt&&logDate?"pointer":"not-allowed",background:logAmt&&logDate?`linear-gradient(135deg,${logModal.color},rgba(255,255,255,0.7))`:G.border,color:"#FFF"}}>
              Confirm
            </button>
          </div>
        </div>
      )}

      {/* ── EDIT MODAL ── */}
      {editModal&&(
        <div onClick={()=>setEditModal(null)} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:G.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,border:`1px solid ${G.border}`,borderBottom:"none",padding:"24px 20px 40px",maxHeight:"70vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,background:G.border,borderRadius:2,margin:"0 auto 20px"}}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>

            </div>
            {[{f:"label",l:"Name",t:"text"},{f:"total",l:"Total (this year)",t:"number"},{f:"used",l:"Used",t:"number"},{f:"broughtForward",l:"Brought Forward (from prev year)",t:"number"},{f:"bfExpiry",l:"Brought Forward Expiry Date",t:"date"}].map(({f,l,t})=>(

                <input type={t} value={editModal[f]} onChange={e=>setEditModal(prev=>({...prev,[f]:t==="number"?parseFloat(e.target.value)||0:e.target.value}))}
                  style={{width:"100%",padding:"12px 14px",fontSize:"16px",background:G.bg,border:`1px solid ${G.border}`,borderRadius:12,color:G.text,outline:"none",fontFamily:ff2}}/>
              </div>

              {LEAVE_COLORS.map(col=>(

              ))}
            </div>
            <button onClick={()=>saveEdit(editModal)} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",fontFamily:ff2,fontSize:"15px",fontWeight:700,cursor:"pointer",background:`linear-gradient(135deg,${editModal.color},rgba(255,255,255,0.7))`,color:"#FFF"}}>Save</button>
          </div>
        </div>
      )}

      {/* ── ADD TYPE MODAL ── */}
      {addModal&&(
        <div onClick={()=>setAddModal(false)} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:G.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,border:`1px solid ${G.border}`,borderBottom:"none",padding:"24px 20px 40px"}}>
            <div style={{width:40,height:4,background:G.border,borderRadius:2,margin:"0 auto 20px"}}/>
            <h3 style={{margin:"0 0 20px",fontSize:18,fontWeight:800,color:G.text}}>New Leave Type</h3>
            {[{f:"newLabel",l:"Name",ph:"e.g. Compassionate Leave",v:newLabel,s:setNewLabel,t:"text"},{f:"newTotal",l:"Total entitlement",ph:"e.g. 3",v:newTotal,s:setNewTotal,t:"number"}].map(({l,ph,v,s,t,f})=>(
              <div key={f} style={{marginBottom:14}}>
                <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:G.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>{l}</p>
                <input type={t} value={v} onChange={e=>s(e.target.value)} placeholder={ph} autoFocus={f==="newLabel"}
                  style={{width:"100%",padding:"12px 14px",fontSize:"16px",background:G.bg,border:`1px solid ${G.border}`,borderRadius:12,color:G.text,outline:"none",fontFamily:ff2}}/>
              </div>
            ))}
            <div style={{marginBottom:14}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:G.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Unit</p>
              <div style={{display:"flex",gap:10}}>
                {["days","hours"].map(u=><button key={u} onClick={()=>setNewUnit(u)} style={{flex:1,padding:"11px",borderRadius:10,cursor:"pointer",fontFamily:ff2,fontWeight:700,fontSize:"13px",background:newUnit===u?"rgba(255,255,255,0.1)":"transparent",border:`1.5px solid ${newUnit===u?"#FFF":G.border}`,color:newUnit===u?"#FFF":G.muted}}>{u}</button>)}
              </div>
            </div>
            <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:G.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Color</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
              {LEAVE_COLORS.map(col=>(
                <div key={col} onClick={()=>setNewColor(col)} style={{width:28,height:28,borderRadius:"50%",background:col,cursor:"pointer",border:newColor===col?"3px solid #FFF":"2px solid transparent",boxShadow:newColor===col?"0 0 0 2px "+col:""}}/>
              ))}
            </div>
            <button onClick={addType} disabled={!newLabel.trim()} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",fontFamily:ff2,fontSize:"15px",fontWeight:700,cursor:newLabel.trim()?"pointer":"not-allowed",background:newLabel.trim()?`linear-gradient(135deg,${newColor},rgba(255,255,255,0.8))`:G.border,color:"#FFF"}}>Add</button>
          </div>
        </div>
      )}
    </div>
  );
}


function App(){
  // Live clock — updates every second
  const[now,setNow]=useState(new Date());
  useEffect(()=>{
    const t=setInterval(()=>setNow(new Date()),1000);
    return()=>clearInterval(t);
  },[]);

  // Track unsubmitted leave logs for the reminder banner — re-read whenever the page changes
  // (e.g. after returning from the Leave tab where a new log may have been added)
  const[unsubmittedLeave,setUnsubmittedLeave]=useState([]);
  const refreshUnsubmittedLeave=()=>{
    try{
      const logs=JSON.parse(localStorage.getItem("mytasks_leave_logs")||"[]");
      setUnsubmittedLeave(Array.isArray(logs)?logs.filter(l=>!l.submitted):[]);
    }catch{setUnsubmittedLeave([]);}
  };
  useEffect(()=>{
    refreshUnsubmittedLeave();
    const t=setInterval(refreshUnsubmittedLeave,2000);
    return()=>clearInterval(t);
  },[]);

  // Load from localStorage on first render, fall back to samples
  const[items,setItemsRaw]=useState(()=>{
    try{const s=localStorage.getItem("mytasks_items");return s?JSON.parse(s):SAMPLE_ITEMS;}catch{return SAMPLE_ITEMS;}
  });
  const[subcats,setSubcatsRaw]=useState(()=>{
    try{const s=localStorage.getItem("mytasks_subcats");return s?JSON.parse(s):DEFAULT_SUBCATS;}catch{return DEFAULT_SUBCATS;}
  });

  // Wrapped setters that also save to localStorage
  const setItems=(val)=>{
    setItemsRaw(prev=>{
      const next=typeof val==="function"?val(prev):val;
      try{localStorage.setItem("mytasks_items",JSON.stringify(next));}catch{}
      return next;
    });
  };
  const setSubcats=(val)=>{
    setSubcatsRaw(prev=>{
      const next=typeof val==="function"?val(prev):val;
      try{localStorage.setItem("mytasks_subcats",JSON.stringify(next));}catch{}
      return next;
    });
  };

  const[view,setView]=useState("home");
  const[mainPage,setMainPage]=useState("expense"); // "tasks" | "leave" | "expense"
  const[activeTab,setActiveTab]=useState("work");
  const[activeSubcat,setActiveSubcat]=useState("All");
  const[filter,setFilter]=useState("Active");
  const[selectedItem,setSelectedItem]=useState(null);
  const[formTitle,setFormTitle]=useState("");
  const[formNote,setFormNote]=useState("");
  const[formCat,setFormCat]=useState("work");
  const[formSubcat,setFormSubcat]=useState("General");
  const[formDue,setFormDue]=useState("");
  const[showManageSubcats,setShowManageSubcats]=useState(false);
  const[manageCat,setManageCat]=useState("work");
  const[newSubcatInput,setNewSubcatInput]=useState("");
  const[editSubcatIdx,setEditSubcatIdx]=useState(null);
  const[editSubcatVal,setEditSubcatVal]=useState("");
  const holdTimer=useRef(null),isHolding=useRef(false);
  const expenseIframeRef=useRef(null);
  const swipeX=useRef(null),swipeY=useRef(null),pillSwipeX=useRef(null);
  const dragFromRef=useRef(null);
  const touchDragFromIdx=useRef(null);
  const touchDragStartY=useRef(null);

  const urgentItems=items.filter(i=>!i.done&&i.dueDate&&daysUntil(i.dueDate)<=2);
  const catItems=(cat)=>items.filter(i=>i.category===cat);
  const catActive=(cat)=>catItems(cat).filter(i=>!i.done).length;
  const catDone=(cat)=>catItems(cat).filter(i=>i.done).length;
  const catPct=(cat)=>{const t=catItems(cat).length;return t?Math.round((catDone(cat)/t)*100):0;};
  const totalActive=items.filter(i=>!i.done).length;
  const totalDone=items.filter(i=>i.done).length;
  const totalPct=items.length?Math.round((totalDone/items.length)*100):0;
  const visibleItems=items.filter(i=>{
    if(i.category!==activeTab)return false;
    if(activeSubcat!=="All"&&i.subcat!==activeSubcat)return false;
    if(filter==="Active")return!i.done;
    if(filter==="Done")return i.done;
    return true;
  }).sort((a,b)=>{
    // Overdue / due soon → top; no due date → middle; done → bottom
    const aD=a.dueDate?daysUntil(a.dueDate):null;
    const bD=b.dueDate?daysUntil(b.dueDate):null;
    // Done items sink to bottom
    if(a.done!==b.done)return a.done?1:-1;
    // Both have due dates → soonest first (overdue = negative = highest priority)
    if(aD!==null&&bD!==null)return aD-bD;
    // One has due date, other doesn't → due date wins
    if(aD!==null)return-1;
    if(bD!==null)return 1;
    // Neither has due date → keep original order
    return 0;
  });

  const openDetail=(item)=>{setSelectedItem(item);setView("detail");};
  const openAdd=()=>{setFormTitle("");setFormNote("");setFormCat(activeTab);setFormSubcat(activeSubcat!=="All"?activeSubcat:"General");setFormDue("");setView("add");};
  const openEdit=(item)=>{setSelectedItem(item);setFormTitle(item.title);setFormNote(item.note||"");setFormCat(item.category);setFormSubcat(item.subcat||"General");setFormDue(item.dueDate||"");setView("edit");};
  const goHome=()=>{setView("home");setSelectedItem(null);};

  const toggle=(id,e)=>{
    e&&e.stopPropagation();
    const updated=items.map(i=>i.id===id?{...i,done:!i.done}:i);
    setItems(updated);
    if(selectedItem?.id===id)setSelectedItem(updated.find(i=>i.id===id));
  };
  const deleteItem=(id)=>{setItems(items.filter(i=>i.id!==id));goHome();};
  const submitForm=()=>{
    if(!formTitle.trim())return;
    if(view==="edit"&&selectedItem){
      const updated=items.map(i=>i.id===selectedItem.id?{...i,title:formTitle.trim(),note:formNote.trim(),category:formCat,subcat:formSubcat,dueDate:formDue}:i);
      setItems(updated);setSelectedItem(updated.find(i=>i.id===selectedItem.id));setView("detail");
    }else{
      setItems([{id:Date.now(),title:formTitle.trim(),note:formNote.trim(),done:false,created:TODAY_STR,category:formCat,subcat:formSubcat,dueDate:formDue},...items]);
      setActiveTab(formCat);setActiveSubcat(formSubcat);setView("home");
    }
  };
  const startHold=(item)=>{isHolding.current=false;holdTimer.current=setTimeout(()=>{isHolding.current=true;openDetail(item);},450);};
  const cancelHold=()=>clearTimeout(holdTimer.current);
  const onTabSwipeStart=(e)=>{swipeX.current=e.touches[0].clientX;swipeY.current=e.touches[0].clientY;};
  const onTabSwipeEnd=(e)=>{
    if(!swipeX.current)return;
    const dx=e.changedTouches[0].clientX-swipeX.current,dy=Math.abs(e.changedTouches[0].clientY-swipeY.current);
    if(Math.abs(dx)>50&&dy<80){
      const idx=TAB_KEYS.indexOf(activeTab);
      if(dx<0&&idx<TAB_KEYS.length-1){setActiveTab(TAB_KEYS[idx+1]);setActiveSubcat("All");}
      if(dx>0&&idx>0){setActiveTab(TAB_KEYS[idx-1]);setActiveSubcat("All");}
    }
    swipeX.current=null;
  };

  // ── UNIFIED BACKUP / RESTORE (Tasks + Subcategories + Leave + Expense) ──
  const requestExpenseExport=()=>new Promise((resolve)=>{
    const win=expenseIframeRef.current?.contentWindow;
    if(!win){resolve(null);return;}
    let settled=false;
    const handler=(ev)=>{
      if(ev.data&&ev.data.type==="EXPENSE_EXPORT_DATA"){
        settled=true;
        window.removeEventListener("message",handler);
        resolve(ev.data.payload);
      }
    };
    window.addEventListener("message",handler);
    win.postMessage({type:"EXPENSE_REQUEST_EXPORT"},"*");
    // Fallback timeout in case the iframe isn't ready (e.g. user never opened Expense tab yet)
    setTimeout(()=>{ if(!settled){window.removeEventListener("message",handler);resolve(null);} },800);
  });

  const sendExpenseImport=(payload)=>new Promise((resolve)=>{
    const win=expenseIframeRef.current?.contentWindow;
    if(!win||!payload){resolve(false);return;}
    let settled=false;
    const handler=(ev)=>{
      if(ev.data&&ev.data.type==="EXPENSE_IMPORT_DONE"){
        settled=true;
        window.removeEventListener("message",handler);
        resolve(!ev.data.error);
      }
    };
    window.addEventListener("message",handler);
    win.postMessage({type:"EXPENSE_IMPORT_DATA",payload},"*");
    setTimeout(()=>{ if(!settled){window.removeEventListener("message",handler);resolve(false);} },800);
  });

  const doBackup=async()=>{
    // Pull live leave data straight from localStorage (always in sync, independent of which page is mounted)
    let leaves=null,leaveLogs=null;
    try{leaves=JSON.parse(localStorage.getItem("mytasks_leaves")||"null");}catch{}
    try{leaveLogs=JSON.parse(localStorage.getItem("mytasks_leave_logs")||"null");}catch{}

    // Pull live expense data from the iframe if it's mounted; otherwise fall back to its own localStorage
    let expense=await requestExpenseExport();
    if(!expense){
      try{
        const raw=localStorage.getItem("expense_tracker_sgd_myr_clean_v3");
        if(raw)expense=JSON.parse(raw);
      }catch{}
    }

    const data=JSON.stringify({
      version:1,
      exportedAt:new Date().toISOString(),
      tasks:{items,subcats},
      leave:{leaves,leaveLogs},
      expense,
    },null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`my-data-backup-${new Date().toISOString().split("T")[0]}.json`;
    a.click();URL.revokeObjectURL(url);
  };

  const doRestore=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);

        // Detect unified format vs legacy {items,subcats}-only format
        const isUnified=parsed&&(parsed.tasks||parsed.leave||parsed.expense);

        if(isUnified){
          if(parsed.tasks?.items)setItems(parsed.tasks.items);
          if(parsed.tasks?.subcats)setSubcats(parsed.tasks.subcats);
          if(parsed.leave?.leaves){try{localStorage.setItem("mytasks_leaves",JSON.stringify(parsed.leave.leaves));}catch{}}
          if(parsed.leave?.leaveLogs){try{localStorage.setItem("mytasks_leave_logs",JSON.stringify(parsed.leave.leaveLogs));}catch{}}
          if(parsed.expense){
            try{localStorage.setItem("expense_tracker_sgd_myr_clean_v3",JSON.stringify(parsed.expense));}catch{}
            await sendExpenseImport(parsed.expense);
          }
        }else{
          // Legacy backup — tasks only
          if(parsed.items)setItems(parsed.items);
          if(parsed.subcats)setSubcats(parsed.subcats);
        }

        setShowManageSubcats(false);
        alert("✅ Restored successfully! (Leave/Expense changes will fully apply next time you open those tabs.)");
      }catch{alert("❌ Invalid backup file.");}
    };
    reader.readAsText(file);e.target.value="";
  };

  // ── DETAIL ────────────────────────────────────────────────────
  if(view==="detail"&&selectedItem){
    const live=items.find(i=>i.id===selectedItem.id)||selectedItem;
    const cat=CATS[live.category];
    const status=dueStatus(live);
    const badge=status?dueBadge(status):null;
    return(
      <SwipeBack onBack={goHome}>
        <div style={{minHeight:"100vh",background:C.bg,fontFamily:ff,padding:"36px 20px 60px"}}>
          <div style={{maxWidth:480,margin:"0 auto"}}>
            <BackBtn label="Back" onClick={goHome}/>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,margin:"20px 0 20px"}}>
              <h1 style={{margin:0,fontSize:26,fontWeight:800,letterSpacing:"-0.4px",lineHeight:1.25,color:live.done?C.muted:C.text,textDecoration:live.done?"line-through":"none",flex:1}}>
                {live.title}
              </h1>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0,paddingTop:4}}>
                <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:live.done?"rgba(16,185,129,0.12)":"rgba(245,158,11,0.12)",color:live.done?C.green:C.amber}}>
                  <span style={{width:5,height:5,borderRadius:"50%",background:live.done?C.green:C.amber,display:"inline-block"}}/>
                  {live.done?"Done":"Active"}
                </span>
                <span style={{fontSize:10,color:C.muted,fontWeight:500}}>{live.created}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <div style={{flex:1,background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:"11px 14px"}}>
                <p style={{margin:"0 0 4px",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Category</p>
                <span style={{display:"inline-flex",alignItems:"center",gap:5,color:cat.color,fontSize:14,fontWeight:600}}>
                  {cat.icon} {cat.label}
                  {live.subcat&&<span style={{padding:"1px 7px",borderRadius:20,background:cat.dim,border:`1px solid ${cat.color}33`,fontSize:11}}>{live.subcat}</span>}
                </span>
              </div>
              {live.dueDate?(
                <div style={{flex:1,background:badge?badge.bg:C.card,borderRadius:12,border:`1px solid ${badge?badge.border:C.border}`,padding:"11px 14px"}}>
                  <p style={{margin:"0 0 4px",fontSize:9,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Due Date</p>
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <span style={{fontSize:14,fontWeight:600,color:badge?badge.text:C.text}}>{fmt(parseDue(live.dueDate))}</span>
                    {status&&!live.done&&<span style={{fontSize:11,fontWeight:700,color:badge.text}}>{dueLabel(live.dueDate)}</span>}
                  </div>
                </div>
              ):<div style={{flex:1}}/>}
            </div>
            {live.note?<Field label="Notes" value={live.note} preWrap/>:null}
            <div style={{display:"flex",gap:10,marginTop:24}}>
              <button onClick={()=>deleteItem(live.id)} style={{flex:1,padding:"13px 0",borderRadius:12,border:`1px solid rgba(239,68,68,0.3)`,background:"rgba(239,68,68,0.1)",cursor:"pointer",fontFamily:ff,fontSize:"13px",fontWeight:700,color:C.red,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 3.5h10M5.5 3.5V2.5h3v1M4.5 3.5l.5 8h4l.5-8" stroke={C.red} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>Delete
              </button>
              <button onClick={()=>openEdit(live)} style={{flex:1,padding:"13px 0",borderRadius:12,border:"1px solid rgba(0,200,150,0.3)",background:"rgba(0,200,150,0.1)",cursor:"pointer",fontFamily:ff,fontSize:"13px",fontWeight:700,color:"#00c896",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z" stroke="#00c896" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>Edit
              </button>
              <button onClick={(e)=>toggle(live.id,e)} style={{flex:1.4,padding:"13px 0",borderRadius:12,border:"none",cursor:"pointer",fontFamily:ff,fontSize:"13px",fontWeight:700,background:live.done?cat.grad:`linear-gradient(135deg,${C.green},#059669)`,color:"#FFF",display:"flex",alignItems:"center",justifyContent:"center",gap:5,boxShadow:live.done?`0 3px 12px ${cat.glow}`:"0 3px 12px rgba(16,185,129,0.3)"}}>
                {live.done?"Active ↩":"Done ✓"}
              </button>
            </div>
          </div>
        </div>
      </SwipeBack>
    );
  }

  // ── ADD / EDIT ────────────────────────────────────────────────
  if(view==="add"||view==="edit"){
    const isEdit=view==="edit";
    const cat=CATS[formCat];
    const onBack=isEdit?()=>setView("detail"):goHome;
    const subcatList=subcats[formCat]||["General"];
    return(
      <SwipeBack onBack={onBack}>
        <div style={{minHeight:"100vh",background:C.bg,fontFamily:ff,padding:"36px 20px 60px"}}>
          <div style={{maxWidth:480,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <BackBtn label="Cancel" onClick={onBack}/>
              {isEdit&&<button onClick={submitForm} disabled={!formTitle.trim()} style={{background:"none",border:"none",cursor:"pointer",fontFamily:ff,fontWeight:700,color:formTitle.trim()?cat.color:"#334155",padding:"8px 0"}}>Save</button>}
            </div>
            <h2 style={{margin:"0 0 20px",fontSize:26,fontWeight:800,color:C.text,letterSpacing:"-0.4px"}}>{isEdit?"Edit Task":"New Task"}</h2>
            <div style={{marginBottom:14}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Title</p>
              <input value={formTitle} onChange={e=>setFormTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitForm()} placeholder="What needs to be done?" autoFocus
                style={{width:"100%",padding:"13px 14px",fontWeight:600,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,outline:"none"}}
                onFocus={e=>e.target.style.borderColor=cat.color} onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
            <div style={{marginBottom:14}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Category</p>
              <div style={{display:"flex",gap:10}}>
                {Object.entries(CATS).map(([key,c])=>{
                  const on=formCat===key;
                  return(<button key={key} onClick={()=>{setFormCat(key);setFormSubcat("General");}} style={{flex:1,padding:"12px",borderRadius:12,cursor:"pointer",fontFamily:ff,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:on?c.dim:"transparent",border:`1.5px solid ${on?c.color:C.border}`,color:on?c.color:C.muted}}>

                <div style={{marginTop:8,height:3,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden"}}>

          </div>
          <div
            style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2,WebkitOverflowScrolling:"touch"}}
            onTouchStart={e=>{e.stopPropagation();pillSwipeX.current=e.touches[0].clientX;}}
            onTouchMove={e=>e.stopPropagation()}
            onTouchEnd={e=>{
              e.stopPropagation();
              if(pillSwipeX.current===null)return;
              const dx=e.changedTouches[0].clientX-pillSwipeX.current;
              if(Math.abs(dx)>40){
                const allSubs=["All",...(subcats[activeTab]||[])];
                const idx=allSubs.indexOf(activeSubcat);
                if(dx<0&&idx<allSubs.length-1)setActiveSubcat(allSubs[idx+1]);
                if(dx>0&&idx>0)setActiveSubcat(allSubs[idx-1]);
              }
              pillSwipeX.current=null;

          >
            {["All",...(subcats[activeTab]||[])].map(s=>{
              const on=activeSubcat===s;

                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px"}}>
                    <button onClick={e=>{e.stopPropagation();toggle(item.id,e);}} style={{width:26,height:26,borderRadius:8,flexShrink:0,border:"none",background:item.done?C.green:"transparent",outline:item.done?"none":`2px solid ${C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.25s, transform 0.2s",transform:item.done?"scale(1.05)":"scale(1)"}}>
                      {item.done&&<svg width="12" height="10" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1.5" stroke="#FFF" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:600,color:item.done?C.muted:C.text,textDecoration:item.done?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:3}}>{item.title}</div>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        {item.subcat&&item.subcat!=="General"&&<span style={{fontSize:9,fontWeight:600,color:cat.color,background:cat.dim,padding:"1px 6px",borderRadius:20,letterSpacing:"0.03em"}}>{item.subcat}</span>}
                        <span style={{fontSize:11,color:C.muted}}>{item.created}</span>
                        {item.dueDate&&!item.done&&badge&&<span style={{fontSize:11,fontWeight:700,color:badge.text,background:badge.bg,border:`1px solid ${badge.border}`,padding:"1px 8px",borderRadius:20}}>{dueLabel(item.dueDate)}</span>}
                      </div>
                    </div>
                    <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
                      {!item.done&&<div style={{width:7,height:7,borderRadius:"50%",background:status&&status!=="ok"?(status==="soon"?C.amber:C.red):cat.color,boxShadow:`0 0 7px ${status&&status!=="ok"?(status==="soon"?C.amber:C.red):cat.color}`}}/>}
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{opacity:0.3}}><path d="M5 3l4 4-4 4" stroke={C.text} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Settings modal */}
      {showManageSubcats&&(()=>{
        const mcat=CATS[manageCat];
        const list=subcats[manageCat]||[];
        const addSubcat=()=>{
          const val=newSubcatInput.trim();
          if(!val||list.includes(val))return;
          setSubcats(prev=>({...prev,[manageCat]:[...prev[manageCat],val]}));
          setNewSubcatInput("");
        };
        const deleteSubcat=(s)=>{
          setSubcats(prev=>({...prev,[manageCat]:prev[manageCat].filter(x=>x!==s)}));
          setItems(prev=>prev.map(i=>i.category===manageCat&&i.subcat===s?{...i,subcat:"General"}:i));
          if(activeSubcat===s)setActiveSubcat("All");
        };
        const saveEdit=(idx)=>{
          const val=editSubcatVal.trim();if(!val)return;
          const old=list[idx];
          setSubcats(prev=>{const next=[...prev[manageCat]];next[idx]=val;return{...prev,[manageCat]:next};});
          setItems(prev=>prev.map(i=>i.category===manageCat&&i.subcat===old?{...i,subcat:val}:i));
          if(activeSubcat===old)setActiveSubcat(val);
          setEditSubcatIdx(null);setEditSubcatVal("");
        };

        // Drag handlers using component-level ref
        const onDragStart=(idx,e)=>{
          dragFromRef.current=idx;
          e.currentTarget.style.opacity="0.4";
          e.currentTarget.style.boxShadow=`0 4px 20px rgba(0,0,0,0.4)`;
        };
        const onDragOver=(e,idx)=>{
          e.preventDefault();
          if(dragFromRef.current===null||dragFromRef.current===idx)return;
          const next=[...list];
          const[moved]=next.splice(dragFromRef.current,1);
          next.splice(idx,0,moved);
          dragFromRef.current=idx;
          setSubcats(prev=>({...prev,[manageCat]:next}));
        };
        const onDragEnd=(e)=>{
          dragFromRef.current=null;
          if(e.currentTarget){e.currentTarget.style.opacity="1";e.currentTarget.style.boxShadow="none";}
        };

        // Touch drag
        const rowHeight=58;
        const onTouchDragStart=(e,idx)=>{
          touchDragFromIdx.current=idx;
          touchDragStartY.current=e.touches[0].clientY;
          e.currentTarget.style.opacity="0.5";
          e.currentTarget.style.transform="scale(1.03)";
          e.currentTarget.style.boxShadow=`0 6px 24px rgba(0,0,0,0.5)`;
          e.currentTarget.style.zIndex="10";
          e.currentTarget.style.background="#252A40";
        };
        const onTouchDragMove=(e,curList)=>{
          if(touchDragFromIdx.current===null)return;
          e.preventDefault();
          const dy=e.touches[0].clientY-touchDragStartY.current;
          const steps=Math.round(dy/rowHeight);
          if(steps===0)return;
          const fromIdx=touchDragFromIdx.current;
          const toIdx=Math.max(0,Math.min(curList.length-1,fromIdx+steps));
          if(toIdx===fromIdx)return;
          const next=[...curList];
          const[moved]=next.splice(fromIdx,1);
          next.splice(toIdx,0,moved);
          touchDragFromIdx.current=toIdx;
          touchDragStartY.current=e.touches[0].clientY;
          setSubcats(prev=>({...prev,[manageCat]:next}));
        };
        const onTouchDragEnd=(e)=>{
          if(e.currentTarget){
            e.currentTarget.style.opacity="1";
            e.currentTarget.style.transform="none";
            e.currentTarget.style.boxShadow="none";
            e.currentTarget.style.zIndex="auto";
            e.currentTarget.style.background=C.bg;
          }
          touchDragFromIdx.current=null;
          touchDragStartY.current=null;
        };

        return(
          <div onClick={()=>setShowManageSubcats(false)} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,border:`1px solid ${C.border}`,borderBottom:"none",padding:"24px 20px 40px",maxHeight:"80vh",overflowY:"auto"}}>
              <div style={{width:40,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
                <h2 style={{margin:0,fontSize:20,fontWeight:800,color:C.text}}>Settings</h2>
                <button onClick={()=>setShowManageSubcats(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:20,padding:"4px 6px"}}>✕</button>
              </div>
              <div style={{marginBottom:10}}>
                <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Subcategories</p>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:20}}>
                {TAB_KEYS.map(k=>{
                  const c=CATS[k];const on=manageCat===k;
                  return(<button key={k} onClick={()=>{setManageCat(k);setEditSubcatIdx(null);setNewSubcatInput("");}} style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:ff,fontWeight:700,fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center",gap:7,background:on?c.dim:"transparent",border:`1.5px solid ${on?c.color:C.border}`,color:on?c.color:C.muted}}>
                    <span style={{color:on?c.color:C.muted}}>{c.icon}</span>{c.label}
                  </button>);
                })}
              </div>

              {/* Draggable subcategory list */}
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
                {list.map((s,idx)=>(
                  <div
                    key={s}
                    data-subcat-idx={idx}
                    draggable={editSubcatIdx!==idx}
                    onDragStart={e=>onDragStart(idx,e)}
                    onDragOver={e=>onDragOver(e,idx)}
                    onDragEnd={onDragEnd}
                    onTouchStart={e=>onTouchDragStart(e,idx)}
                    onTouchMove={e=>onTouchDragMove(e,list)}
                    onTouchEnd={onTouchDragEnd}
                    style={{display:"flex",alignItems:"center",gap:10,background:C.bg,borderRadius:12,padding:"10px 14px",border:`1px solid ${C.border}`,transition:"opacity 0.2s, transform 0.15s, box-shadow 0.15s",cursor:"grab",userSelect:"none"}}
                  >
                    {/* Drag handle — clearer grip icon */}
                    <span style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0,padding:"2px 4px",opacity:0.4}}>
                      <span style={{display:"block",width:16,height:2,borderRadius:1,background:C.subtle}}/>
                      <span style={{display:"block",width:16,height:2,borderRadius:1,background:C.subtle}}/>
                      <span style={{display:"block",width:16,height:2,borderRadius:1,background:C.subtle}}/>
                    </span>

                    {editSubcatIdx===idx?(
                      <>
                        <input value={editSubcatVal} onChange={e=>setEditSubcatVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit(idx)} autoFocus
                          style={{flex:1,padding:"6px 10px",fontSize:"15px",background:C.card,border:`1px solid ${mcat.color}`,borderRadius:8,color:C.text,outline:"none",fontFamily:ff}}/>
                        <button onClick={()=>saveEdit(idx)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:mcat.grad,color:"#FFF",fontFamily:ff,fontWeight:700,fontSize:"13px",cursor:"pointer"}}>Save</button>
                        <button onClick={()=>setEditSubcatIdx(null)} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontFamily:ff,fontSize:"13px",cursor:"pointer"}}>✕</button>
                      </>
                    ):(
                      <>
                        <span style={{flex:1,fontSize:15,fontWeight:500,color:C.text}}>{s}</span>
                        <button onClick={()=>{setEditSubcatIdx(idx);setEditSubcatVal(s);}} style={{padding:"5px 10px",borderRadius:8,border:`1px solid rgba(0,200,150,0.3)`,background:"rgba(0,200,150,0.1)",color:"#00c896",fontFamily:ff,fontSize:"12px",fontWeight:600,cursor:"pointer"}}>Edit</button>
                        {s!=="General"&&<button onClick={()=>deleteSubcat(s)} style={{padding:"5px 10px",borderRadius:8,border:`1px solid rgba(239,68,68,0.25)`,background:"rgba(239,68,68,0.08)",color:C.red,fontFamily:ff,fontSize:"12px",fontWeight:600,cursor:"pointer"}}>Delete</button>}
                      </>
                    )}
                  </div>
                ))}
              </div>
              <p style={{fontSize:10,color:C.muted,textAlign:"center",marginBottom:14,letterSpacing:"0.03em"}}>Hold and drag ≡ to reorder</p>
              <div style={{display:"flex",gap:8}}>
                <input value={newSubcatInput} onChange={e=>setNewSubcatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSubcat()} placeholder="New subcategory name…"
                  style={{flex:1,padding:"12px 14px",fontSize:"16px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,outline:"none",fontFamily:ff}}
                  onFocus={e=>e.target.style.borderColor=mcat.color} onBlur={e=>e.target.style.borderColor=C.border}/>
                <button onClick={addSubcat} disabled={!newSubcatInput.trim()} style={{padding:"12px 18px",borderRadius:12,border:"none",background:newSubcatInput.trim()?mcat.grad:C.border,color:"#FFF",fontFamily:ff,fontWeight:700,fontSize:"14px",cursor:newSubcatInput.trim()?"pointer":"not-allowed"}}>Add</button>
              </div>
            </div>
          </div>
        );
      })()}
      <BottomNav/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
